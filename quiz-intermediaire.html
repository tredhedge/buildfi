<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>buildfi.ca — Rapport Intermédiaire</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',-apple-system,sans-serif;background:#FEFCF9;color:#1A1A1A}
:root{
  --g:#C4944A;--gl:#D4A85A;--gn:#2A8C46;--gnl:#3AA856;--am:#B89830;
  --rd:#CC4444;--bl:#4680C0;--pr:#7C60B8;--tx:#1A1A1A;--ts:#555;--tm:#888;
  --bg:#FEFCF9;--bgc:#fff;--bd:#E8E0D4;--bdl:#F0ECE4;
  --gbg:rgba(196,148,74,.08);--gnbg:rgba(42,140,70,.06);--ambg:rgba(184,152,48,.06);
  --rdbg:rgba(204,68,68,.06);--bga:rgba(124,96,184,.04);
  --blbg:rgba(70,128,192,.06);--cpbg:rgba(124,96,184,.06);
}
.qs{animation:fadeIn .4s ease-out}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
input[type=range]{-webkit-appearance:none;width:100%;height:6px;background:var(--bd);border-radius:3px;outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:24px;height:24px;border-radius:50%;background:var(--g);cursor:pointer;box-shadow:0 2px 6px rgba(196,148,74,.3)}
.pbtn{display:block;width:100%;padding:14px;border-radius:12px;border:none;background:linear-gradient(135deg,var(--g),var(--gl));color:#fff;font-size:15px;font-weight:700;cursor:pointer;margin-top:20px;transition:transform .15s,box-shadow .15s}
.pbtn:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(196,148,74,.25)}
.pbtn-sec{display:block;width:100%;padding:12px;border-radius:10px;border:1.5px solid var(--bd);background:var(--bgc);font-size:14px;font-weight:600;cursor:pointer;margin-top:10px;color:var(--ts);transition:border-color .2s}
.pbtn-sec:hover{border-color:var(--g)}
.card{background:var(--bgc);border:2px solid var(--bd);border-radius:12px;padding:16px;margin-bottom:10px;cursor:pointer;transition:all .2s}
.card:hover{border-color:var(--gl);background:#FDF8F0}
.card.sel{border-color:var(--g);background:linear-gradient(135deg,#FFF8ED,#FDF3E0);box-shadow:0 3px 14px rgba(196,148,74,.25);transform:scale(1.02)}
.chip{display:inline-block;padding:8px 16px;border-radius:20px;border:2px solid var(--bd);background:var(--bgc);font-size:13px;cursor:pointer;transition:all .2s;margin:3px}
.chip:hover{border-color:var(--gl);background:#FDF8F0}
.chip.sel{border-color:var(--g);background:linear-gradient(135deg,#FFF8ED,#FDF3E0);color:var(--g);font-weight:700;box-shadow:0 2px 8px rgba(196,148,74,.2)}
.back-btn{padding:8px 16px;border-radius:8px;border:1px solid var(--bd);background:var(--bgc);font-size:11px;font-weight:600;cursor:pointer;color:var(--ts)}
.loading-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--g);margin:0 3px;animation:bounce .6s infinite alternate}
.loading-dot:nth-child(2){animation-delay:.2s}
.loading-dot:nth-child(3){animation-delay:.4s}
@keyframes bounce{to{opacity:.3;transform:translateY(-6px)}}
/* Professional form styles */
.fld-block{margin-bottom:18px}
.fld-label{font-size:12px;font-weight:700;color:var(--ts);display:block;margin-bottom:5px;letter-spacing:.2px}
.fld-sub{font-size:11px;color:var(--tm);margin-top:3px;line-height:1.5}
.inp{width:100%;padding:11px 13px;border-radius:8px;border:1.5px solid var(--bd);font-size:15px;font-family:'DM Sans',sans-serif;background:var(--bgc);color:var(--tx);transition:border-color .15s}
.inp:focus{outline:none;border-color:var(--g);box-shadow:0 0 0 3px rgba(196,148,74,.1)}
.inp-sm{padding:9px 11px;font-size:13px}
.section-head{font-size:11px;font-weight:800;color:var(--g);text-transform:uppercase;letter-spacing:1.2px;padding:14px 0 8px;border-bottom:2px solid var(--gbg);margin:20px 0 14px}
.phase-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:20px;background:var(--gbg);color:var(--g);font-size:11px;font-weight:700;letter-spacing:.5px;margin-bottom:20px}
.info-box{background:var(--gbg);border:1px solid rgba(196,148,74,.2);border-radius:10px;padding:14px 16px;margin-bottom:16px}
.info-box-note{font-size:11px;color:var(--tm);font-style:italic;margin-top:8px}
@media print{body{background:#fff}.no-print{display:none!important}}
@media(min-width:900px){
  body{font-size:16px}
  .qs h2{font-size:24px!important}
  .qs label{font-size:15px!important}
  .pbtn{font-size:16px!important;padding:18px 20px!important}
  .back-btn{font-size:13px!important;padding:10px 20px!important}
}
@media(max-width:640px){
  .rpt-grid3{grid-template-columns:1fr 1fr!important}
  .rpt-grid2{grid-template-columns:1fr!important}
  .rpt-flex{flex-direction:column!important}
  .rpt-donut{flex-direction:column!important;align-items:center!important;gap:16px!important}
  .rpt-cta-grid{grid-template-columns:1fr!important}
  .tbl-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
}
@media(max-width:480px){
  body{font-size:14px}
  h1{font-size:22px!important}
  h2{font-size:19px!important}
  .rpt-grid3{grid-template-columns:1fr!important}
}
</style>

function calcTax(inc, yr, prov, infR, retired, divInfo) {

      break;
    }
    ptax += (pb[j] - prev) * pr2[j];
    prev = pb[j];

    ON: { small: 0.122, general: 0.265, passive: 0.5017 },
    BC: { small: 0.11,  general: 0.27,  passive: 0.5067 },
    AB: { small: 0.11,  general: 0.23,  passive: 0.4667 },
    SK: { small: 0.11,  general: 0.27,  passive: 0.5067 },
    MB: { small: 0.11,  general: 0.27,  passive: 0.5067 },
    NB: { small: 0.115, general: 0.29,  passive: 0.5267 },
    NS: { small: 0.115, general: 0.29,  passive: 0.5267 },
    PE: { small: 0.10,  general: 0.31,  passive: 0.5467 },
    NL: { small: 0.12,  general: 0.30,  passive: 0.5367 },
    NT: { small: 0.11,  general: 0.265, passive: 0.5017 },
    YT: { small: 0.11,  general: 0.27,  passive: 0.5067 },
    NU: { small: 0.12,  general: 0.27,  passive: 0.5067 }

  var smallBizInc = Math.min(Math.max(0, activeIncome), adjustedSBD);
  var generalInc = Math.max(0, activeIncome - adjustedSBD);
  var activeTax = smallBizInc * cr.small + generalInc * cr.general;
  // Passive investment income: taxed at ~50% — §2.1
  var passiveTax = Math.max(0, passiveIncome) * cr.passive;
  // RDTOH: ~30.67% of passive income added to refundable pool — §2.8
  var rdtohAdded = Math.max(0, passiveIncome) * 0.3067;
  var totalInc = Math.max(0, activeIncome) + Math.max(0, passiveIncome);
  return {
    activeTax: activeTax,
    passiveTax: passiveTax,
    totalTax: activeTax + passiveTax,
    rdtohAdded: rdtohAdded,
    smallBizPortion: smallBizInc,   // generates non-eligible dividends
    generalPortion: generalInc,      // generates eligible dividends via GRIP
    adjustedSBD: adjustedSBD,
    effectiveRate: totalInc > 0 ? (activeTax + passiveTax) / totalInc : 0

function calcQPP(startAge, avgEarn, yrsContrib) {
  var maxM = QPP_MAX_MONTHLY, mga = QPP_MGA;
  var ratio = Math.min(1, avgEarn / mga) * Math.min(1, yrsContrib / 40);
  var adj = 1;
  if (startAge < 65) adj = 1 - 6e-3 * (65 - startAge) * 12;
  else if (startAge > 65) adj = 1 + 7e-3 * (startAge - 65) * 12;
  adj = Math.max(0.64, Math.min(1.42, adj));
  var base = maxM * ratio * adj;
  // QPP2/CPP2: enhancement on earnings between YMPE and YAMPE
  var rrq2 = avgEarn > mga ? QPP2_MAX_MONTHLY * Math.min(1, (Math.min(avgEarn, QPP_YAMPE) - mga) / (QPP_YAMPE - mga)) * Math.min(1, yrsContrib / 40) * adj : 0;
  return base + rrq2;
}
function calcOAS(startAge, income, yr, infR, currentAge) {
  var idxO = Math.pow(1 + (infR || 0.02), yr || 0);
  var maxM = OAS_MAX_MONTHLY * idxO, adj = 1;
  if (startAge > 65) adj = 1 + 6e-3 * (startAge - 65) * 12;
  adj = Math.min(1.36, adj);
  var oas = maxM * adj;
  // OAS 75+ enhancement: 10% bonus (since July 2022)
  if ((currentAge || startAge) >= 75) oas *= 1.10;
  var oasThr = OAS_CLAWBACK_THR * idxO;
  if (income > oasThr) oas = Math.max(0, oas - (income - oasThr) * 0.15 / 12);
  return oas;
}

  if (p.penType === "db" && p.penM > 0) tryP("Pension DB", "penM", p.penM * 0.8, p.penM * 1.2);
  sens.sort(function(a, b) {
    return Math.abs(b.hi - b.lo) - Math.abs(a.hi - a.lo);
  });
  var ruinPct = ruinAges.filter(function(a) {
    return a < 999;
  }).length / N;
  var p5Ruin = ruinAges[Math.floor(N * 0.05)];
  var p10Ruin = ruinAges[Math.floor(N * 0.1)];
  var medPathBilan = medPath.map(function(mp, yi) {
    return Object.assign({}, mp, { age: p.age + yi });
  });
  // Build histogram of final wealth
  var _histBins = [];
  var _cleanFins = fins.filter(function(f) { return isFinite(f); });
  if (_cleanFins.length > 0) {
    var _hMin = _cleanFins[0], _hMax = _cleanFins[_cleanFins.length - 1];
    var _hRange = _hMax - _hMin || 1;
    var _nBins = Math.min(20, Math.max(8, Math.ceil(Math.sqrt(N))));
    var _bw = _hRange / _nBins;
    for (var _bi = 0; _bi < _nBins; _bi++) {
      _histBins.push({ lo: _hMin + _bi * _bw, hi: _hMin + (_bi + 1) * _bw, count: 0 });
    }
    _cleanFins.forEach(function(f) {
      var idx = Math.min(_nBins - 1, Math.max(0, Math.floor((f - _hMin) / _bw)));
      _histBins[idx].count++;
    });
  }
  // Build death vs ruin by 5-year age buckets
  var _dvr = [];
  if (deathAges && ruinAges) {
    var _startAge = Math.floor(p.age / 5) * 5;
    var _endAge = 105;
    for (var _ba = _startAge; _ba <= _endAge; _ba += 5) {
      _dvr.push({ age: _ba, alive: 0, ruin: 0 });
    }
    for (var _di = 0; _di < N; _di++) {
      var _da = deathAges[_di] || 999;
      var _ra = ruinAges[_di] || 999;
      for (var _bi = 0; _bi < _dvr.length; _bi++) {
        var _bAge = _dvr[_bi].age;
        if (_bAge <= _da) _dvr[_bi].alive++;
        if (_ra < 999 && _bAge >= _ra) _dvr[_bi].ruin++;
      }
    }
  }
  return {
    pD,
    medPath: medPathBilan,
    medSimFinal: medSimFinal,

    hasRE: (p.props || []).some(function(pr){return pr.on;}),

    medEstateTax: estateTaxes.sort(function(a, b) {
      return a - b;
    })[Math.floor(N * 0.5)],
    medEstateNet: estateNets.sort(function(a, b) {

    })[Math.floor(N * 0.5)],

    avgEstateTax: estateTaxes.reduce(function(a, b) {
      return a + b;
    }, 0) / N
    ,
    histogram: _histBins,
    deathVsRuin: _dvr,
    // Guyton-Klinger stats
    gkOn: !!p.gkOn,
    gkAvgCuts: gkAllCuts.length > 0 ? gkAllCuts.reduce(function(a,b){return a+b;},0) / gkAllCuts.length : 0,

    gkP5MinSpend: (function(){ var s = gkAllMinSpend.slice().sort(function(a,b){return a-b;}); return s.length > 0 ? s[Math.floor(s.length*0.05)] : 0; })(),
    gkMedianCuts: (function(){ var s = gkAllCuts.slice().sort(function(a,b){return a-b;}); return s.length > 0 ? s[Math.floor(s.length*0.5)] : 0; })(),
    gkP95Cuts: (function(){ var s = gkAllCuts.slice().sort(function(a,b){return a-b;}); return s.length > 0 ? s[Math.floor(s.length*0.95)] : 0; })(),

var DEBT_RATES = {cc:0.1999, student:0.055, car:0.065, loc:0.075};
var COL_ADJ = {QC:1,ON:1.15,BC:1.35,AB:1.05,MB:0.92,SK:0.90,NS:0.95,NB:0.88,NL:0.93,PE:0.87,NT:1.25,YT:1.20,NU:1.40};
var PMED = {QC:380000,ON:620000,BC:850000,AB:440000,MB:320000,SK:310000,NS:360000,NB:260000,NL:270000,PE:280000,NT:400000,YT:420000,NU:380000};

function amortDebt(bal,rate,pay){
  if(bal<=0)return{months:0,totalInt:0,feasible:true};
  var mr=rate/12,b=bal,ti=0,mo=0;
  if(pay<=b*mr&&mr>0)return{months:999,totalInt:Math.round(bal*rate*50),feasible:false};
  while(b>0.01&&mo<600){var ii=b*mr;b-=Math.min(b,pay-ii);ti+=ii;mo++;}
  return{months:mo,totalInt:Math.round(ti),feasible:true};
}
function defMinPay(type,bal){
  if(type==="cc")return Math.max(Math.round(bal*0.02),25);
  if(type==="student")return Math.max(Math.round(bal/120),50);
  if(type==="car")return Math.max(Math.round(bal/60),100);
  return Math.max(Math.round(bal*0.01),Math.round(bal*(DEBT_RATES[type]||0.08)/12));
}

function run5Strategies(baseParams){
  var strats=[
    {key:"statu_quo",  fr:"Statu quo",               en:"Status quo",          p:{}},
    {key:"meltdown",   fr:"Décaissement REER",        en:"RRSP meltdown",       p:{melt:true,meltTgt:Math.round(58523*Math.pow(1.021,Math.max(0,baseParams.retAge-baseParams.age)))}},

    {key:"low_mer",    fr:"Frais réduits",            en:"Low-fee portfolio",   p:{merR:0.0018,merT:0.0018,merN:0.0018}},
    {key:"save_more",  fr:"+300 $/mois d'épargne",   en:"+$300/month savings", p:{rrspC:(baseParams.rrspC||0)+150,tfsaC:(baseParams.tfsaC||0)+150}}
  ];
  return strats.map(function(s){
    var p=Object.assign({},baseParams,s.p);
    Object.keys(p).forEach(function(k){if(p[k]===undefined)delete p[k];});
    var mc=runMC(p,500);
    return{
      key:s.key,fr:s.fr,en:s.en,
      succ:mc?mc.succ:0,
      medF:mc?mc.medF:0,
      medEstateTax:mc?mc.medEstateTax:0,
      medEstateNet:mc?mc.medEstateNet:0,
      p25F:mc?mc.p25F:0,
      p75F:mc?mc.p75F:0
    };
  });
}

function calcMinViableReturn(baseParams){
  var p=Object.assign({},baseParams);
  var lo=0.01,hi=0.15,mid,succMid,itr=0;
  while(hi-lo>0.002&&itr<12){
    mid=(lo+hi)/2;p.eqRet=mid;
    var mc=runMC(p,200);
    succMid=mc?mc.succ:0;
    if(succMid>=0.5)hi=mid; else lo=mid;
    itr++;
  }
  return Math.round((lo+hi)/2*1000)/10;
}

function calcCostOfDelay(baseParams){
  var lostContrib=(baseParams.rrspC||0)+(baseParams.tfsaC||0)+(baseParams.nrC||0);
  var yrsToGrow=baseParams.deathAge-baseParams.retAge;
  var expRet=(baseParams.allocR||0.7)*0.07+(1-(baseParams.allocR||0.7))*0.035-(baseParams.merR||0.015);
  return Math.round(lostContrib*12*Math.pow(1+expRet,yrsToGrow));
}

    mortFreeAge:mortFreeAge,mortPayment:mortPayment,

    totalLiquidSavings:rrsp+tfsa+nr+liraBal+dcBal2+(cOn?(a.cRrsp||0)+(a.cTfsa||0)+(a.cNr||0):0)
  };

}

// ============================================================
function validateMC(mc,p){
  var e=[];
  if(!mc)e.push("MC_NULL");
  else{
    if(mc.succ==null||isNaN(mc.succ)||mc.succ<0||mc.succ>1)e.push("SUCC:"+mc.succ);
    if(!mc.medRevData||mc.medRevData.length===0)e.push("REVDATA_EMPTY");
    if(mc.medF==null||isNaN(mc.medF))e.push("MEDF:"+mc.medF);
  }
  if(p.retSpM<=0)e.push("SPEND_ZERO");
  if(p.age>=p.retAge)e.push("ALREADY_RETIRED");
  return{valid:e.length===0,errors:e};
}

function extractReportData(mc,p){
  var rd=mc.medRevData||[];
  var retRow=rd.find(function(r){return r.age>=p.retAge;})||{};
  // Use qppAge/oasAge for benefit lookup — when retAge < qppAge, retRow.rrq=0 (not started yet)
  var qppRow=rd.find(function(r){return r.age>=(p.qppAge||p.retAge);})||retRow;
  var oasRow=rd.find(function(r){return r.age>=(p.oasAge||p.retAge);})||retRow;
  var qppM=Math.round((qppRow.rrq||0)/12);
  var oasM=Math.round((oasRow.psv||0)/12);
  var penMo=Math.round((retRow.pen||0)/12);
  var govM=qppM+oasM+penMo;
  var coverPct=p.retSpM>0?Math.round(govM/p.retSpM*100):0;
  var gapM=Math.max(0,p.retSpM-govM);
  var retBal=retRow?(Math.round((retRow.aRR||0)+(retRow.aTF||0)+(retRow.aNR||0)+(retRow.aDC||0))):0;
  var annualW=gapM*12;
  var wdPct=retBal>0?Math.round(annualW/retBal*1000)/10:99;
  var workRow=rd.find(function(r){return r.age===p.age;})||{};
  var taxCurrEff=workRow.taxInc>0?Math.round((workRow.tax||0)/workRow.taxInc*100):0;
  var taxRetRow=rd.find(function(r){return r.age===p.retAge+2;})||retRow;
  var taxRetEff=taxRetRow&&taxRetRow.taxInc>0?Math.round((taxRetRow.tax||0)/taxRetRow.taxInc*100):0;
  var taxInfo=calcTax(p.sal,0,p.prov,0);
  var margRate=taxInfo?taxInfo.marg/100:0.30;
  var merW=((p.merR||0.015)*(p.rrsp||0)+(p.merT||0.007)*(p.tfsa||0)+(p.merN||0.007)*(p.nr||0))/Math.max(1,(p.rrsp||0)+(p.tfsa||0)+(p.nr||0));
  var feeCost=Math.round(merW*retBal*(p.deathAge-p.retAge));
  var succPct=Math.round(mc.succ*100);
  var grade;
  if(succPct>=95)grade="A+";else if(succPct>=90)grade="A";else if(succPct>=85)grade="A−";
  else if(succPct>=80)grade="B+";else if(succPct>=75)grade="B";else if(succPct>=70)grade="B−";
  else if(succPct>=60)grade="C+";else if(succPct>=50)grade="C";else if(succPct>=40)grade="D";else grade="F";
  var longevityScore=Math.min(100,succPct);
  var taxScore=taxRetEff<taxCurrEff-5?90:taxRetEff<taxCurrEff?70:50;
  var covScore=Math.min(100,coverPct);
  var tot=(p.rrsp||0)+(p.tfsa||0)+(p.nr||0);
  var maxConc=tot>0?Math.max(p.rrsp||0,p.tfsa||0,p.nr||0)/tot:1;
  var diverScore=maxConc<0.5?85:maxConc<0.7?65:45;
  // Build 5-yr projection table from medRevData + MC endpoints
  // Interpolate from retBal → final MC percentile values for each age
  var projTable=[];
  var finalP25=mc.p25F||0,finalP50=mc.medF||0,finalP75=mc.p75F||0;
  var horizYrs=Math.max(1,p.deathAge-p.retAge);
  for(var tAge=p.retAge;tAge<=p.deathAge;tAge+=5){
    if(tAge>p.deathAge)break;
    var mr5=rd.find(function(r){return r.age===tAge;})||rd[rd.length-1]||{};
    var netInc=Math.round((mr5.rrq||0)+(mr5.psv||0)+(mr5.pen||0)+(mr5.ret||0)+(mr5.ret2||0));
    var tax5=Math.round(mr5.tax||0);
    // Linear interpolation: at retAge = retBal, at deathAge = finalPxx
    var tRatio=Math.max(0,Math.min(1,(tAge-p.retAge)/horizYrs));
    var smooth=tRatio*tRatio*(3-2*tRatio); // smoothstep for more realistic curve
    projTable.push({
      age:tAge,netIncome:netInc,tax:tax5,netAfterTax:Math.max(0,netInc-tax5),
      p25:Math.max(0,Math.round(retBal+(finalP25-retBal)*smooth)),
      p50:Math.max(0,Math.round(retBal+(finalP50-retBal)*smooth)),
      p75:Math.max(0,Math.round(retBal+(finalP75-retBal)*smooth))
    });
  }
  return{
    age:p.age,retAge:p.retAge,sex:p.sex,prov:p.prov,sal:p.sal,
    deathAge:p.deathAge,avgDeath:mc.avgDeath||(p.sex==="F"?87:84),
    totalSavings:(p.rrsp||0)+(p.tfsa||0)+(p.nr||0),
    rrsp:p.rrsp||0,tfsa:p.tfsa||0,nr:p.nr||0,
    liraBal:p.liraBal||0,dcBal:p.dcBal||0,
    retYearBalance:retBal,retBal:retBal,
    qppMonthly:qppM,oasMonthly:oasM,dbPensionMonthly:penMo,
    govMonthly:govM,coveragePct:coverPct,gapMonthly:gapM,
    retSpM:p.retSpM,withdrawalRatePct:wdPct,
    successPct:succPct,succ:mc.succ,grade:grade,
    rMedF:Math.round(mc.medF||0),
    rP5F:Math.round(mc.p5F||mc.var5||0),
    rP25F:Math.round(mc.p25F||0),
    rP75F:Math.round(mc.p75F||0),
    rP95F:Math.round(mc.p95F||0),
    medRuin:mc.medRuin||999,p5Ruin:mc.p5Ruin||999,
    medEstateTax:Math.round(mc.medEstateTax||0),
    medEstateNet:Math.round(mc.medEstateNet||0),
    p25EstateNet:Math.round(mc.p25EstateNet||0),
    p75EstateNet:Math.round(mc.p75EstateNet||0),
    taxCurrentEffective:taxCurrEff,taxRetirementEffective:taxRetEff,
    taxCurrentMarginal:Math.round(margRate*100),margRate:margRate,
    merWeighted:merW,feeCostLifetime:feeCost,
    penType:p.penType,hasPension:p.penType!=="none",
    ptM:p.ptM,ptYrs:p.ptYrs,
    qppAge:p.qppAge,oasAge:p.oasAge,inf:p.inf,
    medRevData:rd,pD:mc.pD||[],fins:mc.fins||[],
    expReturn:p.allocR*0.07+(1-p.allocR)*0.035,
    afterTaxReturn:(p.allocR*0.07+(1-p.allocR)*0.035)*(1-margRate*0.5),
    projTable:projTable,
    longevityScore:longevityScore,taxScore:taxScore,
    covScore:covScore,diverScore:diverScore,
    liqMedF:mc.liqMedF||mc.medF||0,
    liqP5:mc.liqP5||0,liqP25:mc.liqP25||0,
    liqP75:mc.liqP75||0,liqP95:mc.liqP95||0
  };
}

function buildPriority(D,p,fr){
  var margRate=D.margRate||0.30;
  var expRet=D.expReturn||0.053;
  var afterTaxRet=D.afterTaxReturn||0.035;
  var pct=function(v){return(v*100).toFixed(1)+"%";};
  var priorities=[];
  if((p._quiz.employer==="large"||p._quiz.employer==="tech")&&(p._quiz.sources||[p._quiz.source||"employed"]).indexOf("employed")>=0){
    priorities.push({name:fr?"Cotisation employeur (contrepartie)":"Employer match contribution",
      rate:"50-100%",impact:Math.round(p.sal*0.03*(p.deathAge-p.retAge)*0.5),
      why:fr?"Rendement instantané de 50-100%. Généralement priorisé.":"Instant 50-100% return. Generally considered first.",
      color:"#2A8C46",priority:1});
  }
  (p._report.debts||[]).filter(function(d){return d.rate>=0.10;}).forEach(function(d){
    var tl=fr?{cc:"Carte de crédit",student:"Prêt étudiant",car:"Prêt automobile",loc:"Marge de crédit"}
             :{cc:"Credit card",student:"Student loan",car:"Car loan",loc:"Line of credit"};
    priorities.push({name:(tl[d.type]||d.type)+" ("+Math.round(d.bal).toLocaleString()+" $)",
      rate:pct(d.rate),impact:Math.round(d.totalInt||d.bal*d.rate*5),
      why:fr?"Taux de "+pct(d.rate)+" garanti. Le remboursement est généralement priorisé.":"Guaranteed "+pct(d.rate)+" rate. Repayment is often favoured.",
      color:"#CC4444",priority:2});
  });
  if(margRate>0.4){
    priorities.push({name:fr?"Régime enregistré d'épargne-retraite (REER)":"Registered Retirement Savings Plan (RRSP)",
      rate:pct(margRate),impact:Math.round(p.rrspC*12*Math.pow(1+expRet,p.deathAge-p.retAge)),
      why:fr?"Taux marginal de "+pct(margRate)+" > 40%. Déduction fiscale élevée.":"Marginal rate "+pct(margRate)+" > 40%. High tax deduction.",
      color:"#4680C0",priority:3});
    priorities.push({name:fr?"Compte d'épargne libre d'impôt (CELI)":"Tax-Free Savings Account (TFSA)",
      rate:pct(expRet),impact:Math.round(7000*Math.pow(1+expRet,p.deathAge-p.retAge)-7000),
      why:fr?"Croissance libre d'impôt. Après le REER.":"Tax-free growth. After RRSP.",
      color:"#2A8C46",priority:4});
  } else {
    priorities.push({name:fr?"Compte d'épargne libre d'impôt (CELI)":"Tax-Free Savings Account (TFSA)",
      rate:pct(expRet),impact:Math.round(7000*Math.pow(1+expRet,p.deathAge-p.retAge)-7000),
      why:fr?"Taux marginal ≤ 40%. CELI souvent priorisé.":"Marginal rate ≤ 40%. TFSA often favoured.",
      color:"#2A8C46",priority:3});
    priorities.push({name:fr?"Régime enregistré d'épargne-retraite (REER)":"Registered Retirement Savings Plan (RRSP)",
      rate:pct(margRate),impact:Math.round(p.rrspC*12*Math.pow(1+expRet,p.deathAge-p.retAge)*0.7),
      why:fr?"Déduction modérée. Après le CELI.":"Moderate deduction. After TFSA.",
      color:"#4680C0",priority:4});
  }
  (p._report.debts||[]).filter(function(d){return d.rate>=0.04&&d.rate<0.10;}).forEach(function(d){
    var tl=fr?{cc:"Carte de crédit",student:"Prêt étudiant",car:"Prêt automobile",loc:"Marge de crédit"}
             :{cc:"Credit card",student:"Student loan",car:"Car loan",loc:"Line of credit"};
    priorities.push({name:(tl[d.type]||d.type)+" ("+Math.round(d.bal).toLocaleString()+" $)",
      rate:pct(d.rate),impact:Math.round(d.totalInt||d.bal*d.rate*3),
      why:d.rate>afterTaxRet
        ?(fr?"Taux > rendement après impôt. Remboursement généralement favorisé.":"Rate > after-tax return. Repayment generally favored.")
        :(fr?"Taux < rendement. Paiement minimum acceptable.":"Rate < return. Minimum payment acceptable."),
      color:"#B89830",priority:5});
  });
  if(p._report.mortBal>0){
    var mmr=0.055;
    priorities.push({name:fr?"Hypothèque ("+Math.round(p._report.mortBal).toLocaleString()+" $)":"Mortgage ("+Math.round(p._report.mortBal).toLocaleString()+" $)",
      rate:pct(mmr),impact:Math.round(p._report.mortBal*mmr*(p._report.mortAmort||20)*0.3),
      why:mmr>afterTaxRet
        ?(fr?"Taux > rendement après impôt. Remboursement accéléré souvent favorisé.":"Rate > after-tax return. Accelerated repayment often favored.")
        :(fr?"Taux < rendement. L'investissement est souvent favorisé.":"Rate < return. Investing often favored."),
      color:"#B89830",priority:6});
  }
  return priorities;
}

function detectBlocks(q){
  var blocks=[];
  if((q.lira||0)>0||(q.fhsaBal||0)>0||(q.fhsaContrib||0)>0)blocks.push("A");
  if((q.penType&&q.penType!=="none")||q.employer==="gov")blocks.push("B");
  if(q.couple==="yes")blocks.push("C");
  if(q.homeowner)blocks.push("D");
  if(q.hasRental)blocks.push("D2");
  blocks.push("E");
  var totalAssets=(q.rrsp||0)+(q.tfsa||0)+(q.nr||0)+(q.lira||0)+(q.dcBal||0)
    +(q.homeValue||0)+(q.rentalValue||0)+(q.couple==="yes"?(q.cRrsp||0)+(q.cTfsa||0)+(q.cNr||0):0);
  if(totalAssets>100000||(q.lifeInsBenefit||0)>0)blocks.push("F");
  var srcs=q.sources||[q.source||"employed"];
  if(srcs.indexOf("ccpc")>=0)blocks.push("G");
  return blocks;
}

function f$(n){
  if(n==null||isNaN(n))return"—";
  var s=(n<0?"-":"")+Math.abs(Math.round(n)).toString().replace(/\B(?=(\d{3})+(?!\d))/g," ")+" $";
  return s;
}

function render(){
  var app=document.getElementById("app");
  var s=STATE,q=s.quiz,fr=s.lang==="fr";
  if(s.showReport&&s.reportData){
    app.innerHTML=renderReport(s.reportData,s.mc,s.stratData,s.quiz,s.ai,s.aiLoading,s.lang);
    bindReportEvents();
    return;
  }
  if(s.step==="loading"){
    app.innerHTML=renderLoading(fr);
    if(!s.computed){
      s.computed=true;
      setTimeout(function(){
        var params=translateToMC(q);
        var mc=runMC(params,5000);
        var v=validateMC(mc,params);
        if(!v.valid){
          app.innerHTML='<div style="max-width:520px;margin:60px auto;padding:24px;text-align:center">'
            +'<h2 style="color:#CC4444;margin-bottom:12px">'+(fr?"Erreur de calcul":"Calculation error")+'</h2>'
            +'<p style="color:#555;margin-bottom:20px">'+(fr?"Vérifiez vos réponses et réessayez.":"Please check your answers and try again.")+'</p>'
            +'<p style="font-size:11px;color:#999">'+v.errors.join(", ")+'</p>'
            +'<button class="pbtn" onclick="STATE.step=7;STATE.computed=false;render()">'+(fr?"Retour":"Back")+'</button></div>';
          return;
        }
        STATE.mc=mc;
        STATE.reportData=extractReportData(mc,params);
        STATE.stratData=run5Strategies(params);
        STATE.showReport=true;
        render();
      },50);
    }
    return;
  }
  app.innerHTML=renderQuiz(s.step,q,s.lang,s.activeBlocks);
}

function go(step){
  STATE.step=step;
  window.scrollTo({top:0,behavior:"smooth"});
  render();
}
function uq(key,val){STATE.quiz[key]=val;render();}
function setDebtField(type,field,val){
  var q=STATE.quiz;

  if(!d){d={type:type,amount:0,minPayment:0,rate:(DEBT_RATES[type]||0.08)*100};q.debts.push(d);}
  d[field]=val||0;

function toggleWorry(w){
  var q=STATE.quiz;
  if(q.worries.indexOf(w)>=0)q.worries=q.worries.filter(function(x){return x!==w;});
  else if(q.worries.length<3)q.worries.push(w);
  render();
}
function goConditional(){
  var blocks=STATE.activeBlocks=detectBlocks(STATE.quiz);
  if(blocks.length===0){go("loading");return;}
  go("B"+blocks[0]);
}
function goNextBlock(current){
  var blocks=STATE.activeBlocks;
  var idx=blocks.indexOf(current);
  if(idx>=0&&idx<blocks.length-1)go("B"+blocks[idx+1]);
  else go("loading");
}
function goPrevBlock(current){
  var blocks=STATE.activeBlocks;
  var idx=blocks.indexOf(current);
  if(idx>0)go("B"+blocks[idx-1]);
  else go(7);
}
function toggleSource(v){
  var s=STATE.quiz.sources||["employed"];
  var idx=s.indexOf(v);
  if(v==="retired"){STATE.quiz.sources=["retired"];render();return;}
  s=s.filter(function(x){return x!=="retired";});
  if(idx>=0)s=s.filter(function(x){return x!==v;});
  else s.push(v);
  if(s.length===0)s=["employed"];
  STATE.quiz.sources=s;render();
}

function generateAI(){
  var keyEl=document.getElementById("ai-key");
  if(!keyEl||!keyEl.value.trim())return;
  var apiKey=keyEl.value.trim();
  STATE.aiLoading=true;STATE.ai={};render();
  var D=STATE.reportData,params=translateToMC(STATE.quiz),fr=STATE.lang==="fr";
  var isQC=params.prov==="QC";
  var gP=fr?(isQC?"Régime de rentes du Québec":"Régime de pensions du Canada"):(isQC?"Quebec Pension Plan":"Canada Pension Plan");
  var oN=fr?"Pension de la Sécurité de la vieillesse":"Old Age Security";
  var confInstr=STATE.quiz.confidence<=2?"TONE: Extra warm, reassuring. Lead with positives.":STATE.quiz.confidence>=4?"TONE: Data-forward, specific numbers.":"TONE: Balanced, professional.";
  var data={
    profile:{age:D.age,retAge:D.retAge,prov:D.prov,sex:D.sex,couple:params._quiz.couple,source:params._quiz.source,qppAge:D.qppAge,oasAge:D.oasAge},
    savings:{total:D.totalSavings,retBal:D.retBal,rrsp:D.rrsp,tfsa:D.tfsa,nr:D.nr},
    debt:params._report.debtBal>0?{total:params._report.debtBal,annual:params._report.debtAnnualCost}:null,
    property:params._report.homeVal>0?{value:params._report.homeVal,mortgage:params._report.mortBal,equity:params._report.equity}:null,
    gov:{qpp:D.qppMonthly,oas:D.oasMonthly,pension:D.dbPensionMonthly,total:D.govMonthly,cover:D.coveragePct},
    spend:{mo:D.retSpM,gap:D.gapMonthly,wd:D.withdrawalRatePct},
    results:{pct:D.successPct,grade:D.grade,med:D.rMedF,p5:D.rP5F,p25:D.rP25F,p75:D.rP75F},
    tax:{curr:D.taxCurrentEffective,ret:D.taxRetirementEffective,marg:D.taxCurrentMarginal},
    scores:{longevity:D.longevityScore,tax:D.taxScore,gov:D.covScore,divers:D.diverScore},
    bizOn:params._report.bizOn,cOn:params.cOn,succObjective:params._quiz.succObjective||"neutral"
  };
  var worries=(STATE.quiz.worries||[]);
  var worryMap={runout:"EXPAND longevity 3-4 sentences.",tax:"EXPAND tax 3-4 sentences.",inflation:"Note all amounts inflation-adjusted.",health:"Note health costs.",market:"Reference volatility.",legacy:"Mention estate."};
  var wInstr=worries.map(function(w){return worryMap[w]||"";}).filter(Boolean).join(" ");
  var sys="You narrate buildfi.ca Intermédiaire reports ($69 tier).\nRULES: Observational only. CONDITIONAL tense. Never directive. Cite numbers. Grade 10 reading. Short sentences.\nNo acronyms: use '"+gP+"', '"+oN+"'.\nJSON only. No markdown. No preamble.";
  var slots=['"snapshot_intro":"Grade + win. 2-3 sentences."','"savings_context":"Savings trajectory. 2-3 sentences."','"income_mix":"Income sources breakdown — '+gP+', '+oN+', pension, portfolio withdrawal. 2-3 sentences."','"tax_context":"Current vs retirement rate. 2-3 sentences."','"longevity_risk":"Fan chart context. Pessimistic scenario. 2-3 sentences."','"sequence_risk":"Sequence-of-returns risk in context of this person\'s withdrawal rate and equity exposure. 2 sentences."','"benchmark_context":"Explain how this person compares to their age/income peer group. Encouraging tone. 2 sentences."','"obs_1":"Primary lever. FIX-driven."','"obs_2":"Government coverage depth."','"obs_3":"Fee impact."','"obs_4":"Contextual analysis."','"obs_5":"Risk and longevity."','"priority_actions":"Waterfall rationale. 2-3 sentences."','"strategy_highlight":"Best strategy from 5. 2-3 sentences."','"couple_analysis":"'+(params.cOn?"Household optimization. 2-3 sentences.":"N/A — solo")+'"}'];
  var cta_slots=params._report.bizOn?['"ccpc_context":"CCPC strategy highlight."']:[];
  var usr="LANG: "+(fr?"French (vous, conditional tense)":"English")+"\n"+confInstr+"\n"+(wInstr?"WORRIES: "+wInstr+"\n":"")+"\nDATA: "+JSON.stringify(data)+"\n\nReturn ONLY valid JSON:\n{"+slots.concat(cta_slots).join(",")+"}";
  fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
    body:JSON.stringify({model:"claude-opus-4-6",max_tokens:3000,system:sys,messages:[{role:"user",content:usr}]})
  }).then(function(r){return r.json();}).then(function(data){
    var txt=(data.content||[]).map(function(c){return c.text||"";}).join("");
    var clean=txt.replace(/```json|```/g,"").trim();
    try{STATE.ai=JSON.parse(clean);}catch(e){STATE.ai={snapshot_intro:txt};}
    STATE.aiLoading=false;render();
  }).catch(function(e){
    STATE.aiLoading=false;STATE.ai={snapshot_intro:"[AI error: "+e.message+"]"};render();
  });
}

  // Visual benchmark bar helper
  function benchBar(label,userVal,q1,q2,q3,format,note){

    var fmtFn=format==="pct"?function(v){return Math.round(v)+"%";}:f$;

      // User fill

  })();

  h+=secH("15",t("Méthodologie et hypothèses","Methodology and assumptions"),t("Comment ce rapport a été calculé","How this report was calculated"));

    +'<p style="margin-bottom:12px"><strong>'+t("Simulation Monte Carlo","Monte Carlo Simulation")+'</strong> — '
    +t("Ce rapport utilise 5 000 simulations Monte Carlo sur votre horizon de vie complet. Chaque simulation génère un chemin économique unique en tirant aléatoirement des rendements annuels, de l'inflation, de la mortalité stochastique et des événements de queue (fat-tail). Les résultats présentés sont des distributions statistiques, pas des prédictions.","This report uses 5,000 Monte Carlo simulations over your complete life horizon. Each simulation generates a unique economic path by randomly drawing annual returns, inflation, stochastic mortality, and fat-tail events. Results presented are statistical distributions, not predictions.")+'</p>'
    +'<p style="margin-bottom:12px"><strong>'+t("Hypothèses de rendement","Return assumptions")+'</strong> — '
    +t("Rendement espéré actions : 7.0% nominal (5.0% réel). Obligations : 3.5% nominal. Volatilité actions : 15% annuel. Fat-tail events : distribution à queue lourde avec skewness négatif. Corrélation actions/obligations : −0.20.","Expected equity return: 7.0% nominal (5.0% real). Bonds: 3.5% nominal. Equity volatility: 15% annual. Fat-tail events: heavy-tail distribution with negative skewness. Equity/bond correlation: −0.20.")+'</p>'
    +'<p style="margin-bottom:12px"><strong>'+t("Tables de mortalité","Mortality tables")+'</strong> — '
    +t("CPM-2014 (tables actuarielles canadiennes). Mortalité stochastique activée — l'espérance de vie varie d'une simulation à l'autre selon ces tables. L'âge de planification maximum est 95 ans.","CPM-2014 (Canadian actuarial tables). Stochastic mortality enabled — life expectancy varies across simulations based on these tables. Maximum planning age is 95.")+'</p>'
    +'<p style="margin-bottom:12px"><strong>'+t("Fiscalité","Taxation")+'</strong> — '
    +t("Paramètres fiscaux 2026 : paliers fédéraux et provinciaux, montant personnel de base, seuil de récupération de la PSV (95 323 $), inclusion des gains en capital à 50%/66,67% selon le seuil de 250 000 $. Indexation des paramètres selon l'inflation simulée.","2026 tax parameters: federal and provincial brackets, basic personal amount, OAS clawback threshold ($95,323), capital gains inclusion at 50%/66.67% based on $250,000 threshold. Parameters indexed to simulated inflation.")+'</p>'
    +'<p style="margin-bottom:12px"><strong>'+t("Régime de rentes et PSV","QPP/CPP and OAS")+'</strong> — '
    +t("Calcul selon les règles 2026. RRQ/RPC ajusté selon l'âge de début : −0.6%/mois avant 65 ans, +0.7%/mois après 65 ans (max. 70 ans). PSV : −0.6%/mois avant 65 ans, +0.6%/mois après 65 ans. Indexation à l'IPC dans la simulation.","Calculated per 2026 rules. QPP/CPP adjusted by start age: −0.6%/month before 65, +0.7%/month after 65 (max. 70). OAS: −0.6%/month before 65, +0.6%/month after 65. CPI-indexed in simulation.")+'</p>'
    +'<p style="margin-bottom:0"><strong>'+t("Limitations","Limitations")+'</strong> — '
    +t("Ce rapport ne constitue pas un conseil financier. Les projections sont des estimations probabilistes basées sur des hypothèses — les rendements réels, la fiscalité et la législation peuvent évoluer. Ce rapport ne tient pas compte des changements de situation personnelle, professionnelle ou familiale. Consultez un planificateur financier agréé (Pl. Fin.) pour toute décision importante.","This report does not constitute financial advice. Projections are probabilistic estimates based on assumptions — actual returns, taxation and legislation may change. This report does not account for changes in personal, professional or family circumstances. Consult a Certified Financial Planner (CFP) for any major decision.")+'</p>'
    +'</div>'
  );
  h+='<div style="background:var(--rdbg);border:1px solid rgba(204,68,68,.2);border-radius:10px;padding:16px;margin-top:14px;font-size:11px;color:#555;line-height:1.7">'
    +'<strong>'+t("Avertissement légal","Legal disclaimer")+'</strong> — '
    +t("buildfi.ca est un outil d'information et de planification financière personnelle. Il n'est pas enregistré à titre de conseiller en valeurs mobilières ou de planificateur financier. Les informations contenues dans ce rapport sont fournies à des fins éducatives uniquement et ne constituent pas un conseil financier, juridique ou fiscal. buildfi.ca décline toute responsabilité pour les décisions prises sur la base de ce rapport. Les résultats sont basés sur des hypothèses qui peuvent ne pas refléter la réalité future. La performance passée ne garantit pas les résultats futurs. Ce rapport est conforme aux directives de l'AMF concernant l'utilisation de simulations financières à des fins éducatives.","buildfi.ca is a personal financial planning information tool. It is not registered as a securities advisor or financial planner. The information in this report is provided for educational purposes only and does not constitute financial, legal, or tax advice. buildfi.ca disclaims any responsibility for decisions made based on this report. Results are based on assumptions that may not reflect future reality. Past performance does not guarantee future results. This report complies with AMF guidelines on the use of financial simulations for educational purposes.")+'</div>';
  h+=secEnd();

  // === S16: CTA + Upsell ===
  h+=secH("16",t("Prochaines étapes","Next steps"),t("Passer à l'action","Take action"));

    +'<div style="position:absolute;bottom:-40px;left:30%;width:200px;height:200px;border-radius:50%;background:rgba(196,148,74,0.06)"></div>'

    +'<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">'

    +'<span style="background:var(--g);color:#fff;font-size:10px;font-weight:800;padding:2px 8px;border-radius:20px;letter-spacing:.5px">'+t("SIMULATEUR EXPERT","EXPERT SIMULATOR")+'</span>'
    +'</div>'
    +'<div style="font-size:26px;font-weight:800;margin-bottom:6px;line-height:1.2">'+t("Allez plus loin.<br>Bien plus loin.","Go further.<br>Much further.")+'</div>'

    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:24px">'
    +[
      {icon:"🎓",t:fr?"RESP — épargne-études":"RESP — education savings"},

    ].map(function(f){
      return'<div style="display:flex;align-items:center;gap:8px;font-size:13px;color:rgba(255,255,255,0.85)">'
        +'<span>'+f.icon+'</span><span>'+f.t+'</span></div>';

    +'</div>'

    +'<div>'
    +'<span style="font-size:36px;font-weight:900;color:var(--g)">139 $</span>'

    +'</div>'
    +'<div style="font-size:11px;color:rgba(255,255,255,0.35);margin-top:14px">'+t("Paiement sécurisé · Aucun abonnement · Accès immédiat","Secure payment · No subscription · Instant access")+'</div>'
    +'</div></div>';

  // Seule ressource gratuite légitime
  h+='<div style="margin-top:16px">'
    +'<div style="display:flex;align-items:center;gap:10px;padding:14px 16px;border-radius:10px;border:1px solid var(--bd);background:var(--bgc);cursor:pointer" onclick="window.print()">'
    +'<span style="font-size:18px">🖨️</span>'
    +'<div><div style="font-size:13px;font-weight:600;color:var(--ts)">'+t("Imprimer ou sauvegarder en PDF","Print or save as PDF")+'</div>'
    +'<div style="font-size:11px;color:var(--tm)">'+t("Conservez une copie de votre rapport","Keep a copy of your report")+'</div>'
    +'</div></div></div>';

  h+=secEnd();
  h+='</div>'; // end report body

  return h;
}
