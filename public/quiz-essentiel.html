<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',-apple-system,sans-serif;background:#FEFCF9;color:#1A1A1A}
:root{
  --g:#C4944A;--gl:#D4A85A;--gn:#2A8C46;--gnl:#3AA856;--am:#B89830;
  --rd:#CC4444;--bl:#4680C0;--pr:#7C60B8;--tx:#1A1A1A;--ts:#555;--tm:#888;
  --bg:#FEFCF9;--bgc:#fff;--bd:#E8E0D4;--bdl:#F0ECE4;
  --gbg:rgba(196,148,74,.08);--gnbg:rgba(42,140,70,.06);--ambg:rgba(184,152,48,.06);
  --rdbg:rgba(204,68,68,.06);--bga:rgba(124,96,184,.04);
}
.qs{animation:fadeIn .4s ease-out}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
input[type=range]{-webkit-appearance:none;width:100%;height:6px;background:var(--bd);border-radius:3px;outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:24px;height:24px;border-radius:50%;background:var(--g);cursor:pointer;box-shadow:0 2px 6px rgba(196,148,74,.3)}
.pbtn{display:block;width:100%;padding:14px;border-radius:12px;border:none;background:linear-gradient(135deg,var(--g),var(--gl));color:#fff;font-size:15px;font-weight:700;cursor:pointer;margin-top:20px;transition:transform .15s,box-shadow .15s}
.pbtn:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(196,148,74,.25)}
.card{background:var(--bgc);border:2px solid var(--bd);border-radius:12px;padding:16px;margin-bottom:10px;cursor:pointer;transition:all .2s}
.card:hover{border-color:var(--gl);background:#FDF8F0}
.card.sel{border-color:var(--g);background:linear-gradient(135deg,#FFF8ED,#FDF3E0);box-shadow:0 3px 14px rgba(196,148,74,.25);transform:scale(1.02)}
.chip{display:inline-block;padding:8px 16px;border-radius:20px;border:2px solid var(--bd);background:var(--bgc);font-size:13px;cursor:pointer;transition:all .2s;margin:3px}
.chip:hover{border-color:var(--gl);background:#FDF8F0}
.chip.sel{border-color:var(--g);background:linear-gradient(135deg,#FFF8ED,#FDF3E0);color:var(--g);font-weight:700;box-shadow:0 2px 8px rgba(196,148,74,.2)}
.back-btn{padding:8px 16px;border-radius:8px;border:1px solid var(--bd);background:var(--bgc);font-size:11px;font-weight:600;cursor:pointer;color:var(--ts)}
.loading-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--g);margin:0 3px;animation:bounce .6s infinite alternate}
.loading-dot:nth-child(2){animation-delay:.2s}
.loading-dot:nth-child(3){animation-delay:.4s}
@keyframes bounce{to{opacity:.3;transform:translateY(-6px)}}
@media print{body{background:#fff}.no-print{display:none!important}}
@media(min-width:900px){
  body{font-size:16px}
  .qs h2{font-size:24px!important}
  .qs label{font-size:15px!important}
  .qs input[type="number"],.qs select{font-size:17px!important;padding:14px!important}
  .qs .card{padding:18px 16px!important}
  .qs .card div[style*="font-weight:700"]{font-size:16px!important}
  .qs .card div[style*="font-size:12px"]{font-size:13px!important}
  .pbtn{font-size:16px!important;padding:18px 20px!important}
  .back-btn{font-size:13px!important;padding:10px 20px!important}
}
@media(max-width:640px){
  .rpt-grid3{grid-template-columns:1fr!important}
  .rpt-grid2{grid-template-columns:1fr!important}
  .rpt-flex{flex-direction:column!important}
  .rpt-donut{flex-direction:column!important;align-items:center!important;gap:16px!important}
  .rpt-tax-label{width:100px!important;font-size:11px!important}
  .rpt-cta-grid{grid-template-columns:1fr!important}
}
@media(max-width:480px){
  body{font-size:14px}
  h1{font-size:22px!important}
  h2{font-size:18px!important}
}
</style>

  // Build death vs ruin by 5-year age buckets
  var _dvr = [];
  if (deathAges && ruinAges) {
    var _startAge = Math.floor(p.age / 5) * 5;
    var _endAge = 105;
    for (var _ba = _startAge; _ba <= _endAge; _ba += 5) {
      _dvr.push({ age: _ba, alive: 0, ruin: 0 });
    }
    for (var _di = 0; _di < N; _di++) {
      var _da = deathAges[_di] || 999;
      var _ra = ruinAges[_di] || 999;
      for (var _bi = 0; _bi < _dvr.length; _bi++) {
        var _bAge = _dvr[_bi].age;
        if (_bAge <= _da) _dvr[_bi].alive++;
        if (_ra < 999 && _bAge >= _ra) _dvr[_bi].ruin++;
      }
    }
  }
  return {
    pD,
    medPath: medPathBilan,
    medSimFinal: medSimFinal,
    medSimRuin: medSimRuin,
    medSimDeath: medSimDeath,
    medSimFinalR: medSimFinal / discFinal,
    medSimEstateTax: medSimEstateTax,
    medSimEstateNet: medSimEstateNet,
    succ,
    fins,
    sf,
    medRuin,
    ruinPct,
    p5Ruin,
    p10Ruin,
    discFinal,
    sens,
    revData,
    medRevData,
    avgDeath,
    deathAges: deathAges,
    cDeathAges: cDeathAges,
    ruinAges: ruinAges,
    medF: fins[Math.floor(N * 0.5)],
    p5F: var5,
    p25F: fins[Math.floor(N * 0.25)],
    p75F: fins[Math.floor(N * 0.75)],
    p95F: fins[Math.floor(N * 0.95)],
    mean,
    sd,
    var5,
    cvar5,
    rMedF: fins[Math.floor(N * 0.5)] / discFinal,
    rP5F: var5 / discFinal,
    rP25F: fins[Math.floor(N * 0.25)] / discFinal,
    rP75F: fins[Math.floor(N * 0.75)] / discFinal,
    rP95F: fins[Math.floor(N * 0.95)] / discFinal,
    rMean: mean / discFinal,
    rSD: sd / discFinal,
    rVar5: var5 / discFinal,
    rCvar5: cvar5 / discFinal,
    // Liquid wealth metrics (excludes real estate)
    liqMedF: liqMedF,
    liqP5: liqP5,
    liqP25: liqP25,
    liqP75: liqP75,
    liqP95: liqP95,
    rLiqMedF: liqMedF / discFinal,
    rLiqP5: liqP5 / discFinal,
    hasRE: (p.props || []).some(function(pr){return pr.on;}),
    // Estate metrics
    medEstateTax: estateTaxes.sort(function(a, b) {
      return a - b;
    })[Math.floor(N * 0.5)],
    medEstateNet: estateNets.sort(function(a, b) {
      return a - b;
    })[Math.floor(N * 0.5)],
    p5EstateNet: estateNets[Math.floor(N * 0.05)],
    p10EstateNet: estateNets[Math.floor(N * 0.1)],
    p25EstateNet: estateNets[Math.floor(N * 0.25)],
    p75EstateNet: estateNets[Math.floor(N * 0.75)],
    p90EstateNet: estateNets[Math.floor(N * 0.9)],
    p95EstateNet: estateNets[Math.floor(N * 0.95)],
    p5EstateTax: estateTaxes[Math.floor(N * 0.05)],
    p25EstateTax: estateTaxes[Math.floor(N * 0.25)],
    p75EstateTax: estateTaxes[Math.floor(N * 0.75)],
    p95EstateTax: estateTaxes[Math.floor(N * 0.95)],
    avgEstateTax: estateTaxes.reduce(function(a, b) {
      return a + b;
    }, 0) / N
    ,
    histogram: _histBins,
    deathVsRuin: _dvr,
    // Guyton-Klinger stats
    gkOn: !!p.gkOn,
    gkAvgCuts: gkAllCuts.length > 0 ? gkAllCuts.reduce(function(a,b){return a+b;},0) / gkAllCuts.length : 0,
    gkAvgRaises: gkAllRaises.length > 0 ? gkAllRaises.reduce(function(a,b){return a+b;},0) / gkAllRaises.length : 0,
    gkAvgSpend: gkAllAvgSpend.length > 0 ? gkAllAvgSpend.reduce(function(a,b){return a+b;},0) / gkAllAvgSpend.length : 0,
    gkP5MinSpend: (function(){ var s = gkAllMinSpend.slice().sort(function(a,b){return a-b;}); return s.length > 0 ? s[Math.floor(s.length*0.05)] : 0; })(),
    gkMedianCuts: (function(){ var s = gkAllCuts.slice().sort(function(a,b){return a-b;}); return s.length > 0 ? s[Math.floor(s.length*0.5)] : 0; })(),
    gkP95Cuts: (function(){ var s = gkAllCuts.slice().sort(function(a,b){return a-b;}); return s.length > 0 ? s[Math.floor(s.length*0.95)] : 0; })(),
    gkAvgCutYrs: gkAllCutYrs.length > 0 ? gkAllCutYrs.reduce(function(a,b){return a+b;},0) / gkAllCutYrs.length : 0,
    gkMedianCutYrs: (function(){ var s = gkAllCutYrs.slice().sort(function(a,b){return a-b;}); return s.length > 0 ? s[Math.floor(s.length*0.5)] : 0; })(),
    gkAvgMaxStreak: gkAllMaxStreak.length > 0 ? gkAllMaxStreak.reduce(function(a,b){return a+b;},0) / gkAllMaxStreak.length : 0,
    gkAvgMinFactor: gkAllMinFactor.length > 0 ? gkAllMinFactor.reduce(function(a,b){return a+b;},0) / gkAllMinFactor.length : 1,
    gkAvgFactor: gkAllAvgFactor.length > 0 ? gkAllAvgFactor.reduce(function(a,b){return a+b;},0) / gkAllAvgFactor.length : 1
  };
}

// ============================================================
// TRANSLATOR: Quiz answers → runMC params (55 fields)
// ============================================================
var DEBT_RATES = {cc:0.1999, student:0.055, car:0.065, loc:0.075};
var COL_ADJ = {QC:1, ON:1.15, BC:1.35, AB:1.05, MB:0.92, SK:0.90, NS:0.95, NB:0.88, NL:0.93, PE:0.87, NT:1.25, YT:1.20, NU:1.40};
var PMED = {QC:380000, ON:620000, BC:850000, AB:440000, MB:320000, SK:310000, NS:360000, NB:260000, NL:270000, PE:280000, NT:400000, YT:420000, NU:380000};

function amortDebt(bal, rate, pay) {
  if (bal <= 0) return {months:0, totalInt:0, feasible:true};
  var mr = rate / 12, b = bal, ti = 0, mo = 0;
  if (pay <= b * mr && mr > 0) return {months:999, totalInt:Math.round(bal*rate*50), feasible:false};
  while (b > 0.01 && mo < 600) { var ii = b * mr; b -= Math.min(b, pay - ii); ti += ii; mo++; }
  return {months:mo, totalInt:Math.round(ti), feasible:true};
}

function defMinPay(type, bal) {
  if (type === "cc") return Math.max(Math.round(bal * 0.02), 25);
  if (type === "student") return Math.max(Math.round(bal / 120), 50);
  if (type === "car") return Math.max(Math.round(bal / 60), 100);
  return Math.max(Math.round(bal * 0.01), Math.round(bal * (DEBT_RATES[type] || 0.08) / 12));
}

function translateToMC(a) {
  var age = a.age || 35, retAge = a.retAge || 65, sex = a.sex || "M";
  var prov = a.prov || "QC", sal = a.income || 70000;
  var col = COL_ADJ[prov] || 1;

  // Savings split
  var tot = a.totalSavings || 0, rrsp, tfsa, nr;
  if (a.savingsDetail && a.rrsp != null) {
    rrsp = a.rrsp || 0; tfsa = a.tfsa || 0; nr = a.nr || 0; tot = rrsp + tfsa + nr;
  } else {
    if (age < 35) { rrsp = tot * 0.20; tfsa = tot * 0.50; nr = tot * 0.30; }
    else if (age < 50) { rrsp = tot * 0.45; tfsa = tot * 0.35; nr = tot * 0.20; }
    else { rrsp = tot * 0.55; tfsa = tot * 0.25; nr = tot * 0.20; }
  }

  // Contributions: TFSA first, RRSP, then NR
  var mc = a.monthlyContrib || 0, ac = mc * 12;
  var tfsaC = Math.min(ac, 7000);
  var rrspC = Math.min(ac - tfsaC, Math.min(sal * 0.18, 31560));
  var nrC = Math.max(0, ac - tfsaC - rrspC);

  // Pension from employer
  var penType = "none", penM = 0, dcBal = 0, penIdx = false;
  var emp = a.employer || "x";
  if (emp === "gov") {
    penType = "db"; penIdx = true;
    var projYrs = Math.min(35, Math.max(0, retAge - 25));
    var projSal = sal * Math.pow(1.021, Math.max(0, retAge - age));
    penM = Math.round(projSal * 0.02 * projYrs / 12);
  } else if (emp === "large" || emp === "tech") {
    penType = "dc";
    dcBal = Math.round(sal * 0.06 * Math.min(20, Math.max(0, age - 25)));
  }

  // Spending
  var retSpM;
  if (a.lifestyle === "cozy") retSpM = Math.round(3000 * col);
  else if (a.lifestyle === "premium") retSpM = Math.round(7500 * col);
  else retSpM = Math.round(5000 * col);

  // Allocation from risk
  var eq;
  if (a.risk === "conservative") eq = 0.50;
  else if (a.risk === "growth") eq = 0.85;
  else eq = 0.70;
  var mer = eq > 0.7 ? 0.018 : eq > 0.5 ? 0.015 : 0.012;

  // QPP/OAS timing
  var qppAge = Math.max(60, Math.min(70, retAge < 60 ? 65 : retAge));
  var oasAge = Math.max(65, Math.min(70, retAge < 65 ? 65 : retAge));

  // Part-time
  var ptM = 0, ptYrs = 0;
  if (a.parttime === "yes" || a.parttime === "maybe") {
    ptM = a.parttimeAmount > 0 ? a.parttimeAmount : (a.parttime === "yes" ? 1500 : 800);
    ptYrs = a.parttimeYears > 0 ? a.parttimeYears : (a.parttime === "yes" ? 5 : 3);
  }

  // Property
  var props = [];
  if (a.homeowner) {
    var hv = a.homeValue || PMED[prov] || 400000;
    var mb = a.mortgage || Math.round(hv * 0.55);
    var ma = a.mortgageAmort || 20;
    props.push({on:true, name:"Primary", pri:true, val:hv, mb:mb, mr:0.055, ma:ma,
      ri:0.035, rm:0, ox:0, pt:0, ins:0, sa:0, cg:0, landPct:0.30,
      heloc:0, helocRate:0.065, helocMax:0.65, smithOn:false,
      refiAge:0, refiAmt:0, dsAge:0, dpaOn:false, dpaRate:0.04});
  }

  // Debts (for report + MC)
  var debts = ((a.debts || []).filter(function(d){return (d.amount||0)>0;})).map(function(d) {
    var bal = d.amount, rate = d.rate > 0 ? d.rate / 100 : (DEBT_RATES[d.type] || 0.08);
    var minPay = d.minPayment > 0 ? d.minPayment : defMinPay(d.type, bal);
    var am = amortDebt(bal, rate, minPay);
    return {type:d.type, bal:bal, rate:rate, minPay:minPay, months:am.months, totalInt:am.totalInt, feasible:am.feasible, annualCost:Math.round(bal*rate)};
  });

  var deathAge = sex === "F" ? 92 : 90;
  var nrVal = Math.round(nr);

  return {
    age:age, retAge:retAge, sex:sex, prov:prov, sal:sal, deathAge:deathAge,
    rrsp:Math.round(rrsp), tfsa:Math.round(tfsa), nr:nrVal,
    rrspC:Math.round(rrspC), tfsaC:Math.round(tfsaC), nrC:Math.round(nrC),
    retSpM:retSpM, penType:penType, penM:penM, dcBal:dcBal, penIdx:penIdx,
    allocR:eq, allocT:eq, allocN:Math.max(0.3,eq-0.2),
    merR:mer, merT:mer*0.5, merN:mer*0.5, nrTaxDrag:0.003,
    inf:0.021, qppAge:qppAge, oasAge:oasAge, avgE:sal,
    qppYrs:Math.min(40, Math.max(0, age-18)),
    ptM:ptM, ptYrs:ptYrs, props:props, debts:debts,
    costBase:nrVal,
    // Features OFF for Essentiel
    fatT:false, stochMort:false, stochInf:false,
    wStrat:"optimal", melt:false, split:false, bridge:false,
    gkOn:false, respOn:false, ftqOn:false, cOn:false, bizOn:false,
    goP:1.0, slP:1.0, noP:1.0, healthMul:0,
    healthAge:85, smileSlAge:75, smileNoAge:85,
    pen2Type:"none", pen2M:0, pen2Idx:false,
    peExitStrat:"lump", pmExitStrat:"lump",
    strs:"none", strs2:"none", stWhen:"start", stWhen2:"start",
    qppShare:0, contGr:0, glide:false, glideSpd:0,
    // Quiz passthrough (for AI + report, not MC)
    _quiz: {
      couple:a.couple||"no", win:a.win||"", fix:a.fix||"", confidence:a.confidence||3,
      worries:a.worries||[], family:a.family||"", risk:a.risk||"balanced",
      employer:a.employer||"", savingsDetail:a.savingsDetail||false,
      lifestyle:a.lifestyle||"active", parttime:a.parttime||"no"
    },
    _report: {
      debts:debts,
      debtBal:debts.reduce(function(s,d){return s+d.bal;},0),
      debtAnnualCost:debts.reduce(function(s,d){return s+d.annualCost;},0),
      homeVal:props.length>0?props[0].val:0,
      mortBal:props.length>0?props[0].mb:0,
      mortAmort:props.length>0?(a.mortgageAmort||20):0,
      equity:props.length>0?Math.max(0,props[0].val-props[0].mb):0,
      mortFreeAge:props.length>0&&props[0].mb>0?age+(a.mortgageAmort||20):0,
      mortPayment:props.length>0&&props[0].mb>0?(function(){var mmr=0.055/12,n=(a.mortgageAmort||20)*12;return Math.round(props[0].mb*mmr/(1-Math.pow(1+mmr,-n)));})():0,
    }
  };
}

// ============================================================
// AUDIT GUARDRAILS: validate MC results before rendering
// ============================================================
function validateMC(mc, p) {
  var e = [];
  if (!mc || mc._placeholder) e.push("MC_NULL");
  else {
    if (mc.succ == null || isNaN(mc.succ) || mc.succ < 0 || mc.succ > 1) e.push("SUCC:" + mc.succ);
    if (!mc.medRevData || mc.medRevData.length === 0) e.push("REVDATA_EMPTY");
    if (mc.medF == null || isNaN(mc.medF)) e.push("MEDF:" + mc.medF);
  }
  if (p.retSpM <= 0) e.push("SPEND_ZERO");
  if (p.age >= p.retAge) e.push("ALREADY_RETIRED");
  return {valid:e.length===0, errors:e};
}

// ============================================================
// DATA ADAPTER: runMC output → report/AI data shape
// ============================================================
function extractReportData(mc, p) {
  var rd = mc.medRevData || [];
  var retRow = rd.find(function(r){return r.age >= p.retAge;}) || {};
  var qppM = Math.round((retRow.rrq || 0) / 12);
  var oasM = Math.round((retRow.psv || 0) / 12);
  var penMo = Math.round((retRow.pen || 0) / 12);
  var govM = qppM + oasM + penMo;
  var coverPct = p.retSpM > 0 ? Math.round(govM / p.retSpM * 100) : 0;
  var gapM = Math.max(0, p.retSpM - govM);
  // Retirement year balance
  var retBal = retRow ? Math.round((retRow.aRR||0) + (retRow.aTF||0) + (retRow.aNR||0) + (retRow.aDC||0)) : 0;
  // Withdrawal rate
  var annualW = gapM * 12;
  var wdPct = retBal > 0 ? Math.round(annualW / retBal * 1000) / 10 : 99;
  // Tax rates
  var workRow = rd.find(function(r){return r.age === p.age;}) || {};
  var taxCurrEff = workRow.taxInc > 0 ? Math.round((workRow.tax||0) / workRow.taxInc * 100) : 0;
  var taxRetRow = rd.find(function(r){return r.age === p.retAge + 2;}) || retRow;
  var taxRetEff = taxRetRow && taxRetRow.taxInc > 0 ? Math.round((taxRetRow.tax||0) / taxRetRow.taxInc * 100) : 0;
  // Marginal rate (for debt priority)
  var taxInfo = calcTax(p.sal, 0, p.prov, 0);
  var margRate = taxInfo ? taxInfo.marginal / 100 : 0.30;
  // Fee cost
  var merW = (p.merR * p.rrsp + p.merT * p.tfsa + p.merN * p.nr) / Math.max(1, p.rrsp + p.tfsa + p.nr);
  var feeCost = Math.round(merW * retBal * (p.deathAge - p.retAge));
  // Success
  var succPct = Math.round(mc.succ * 100);
  var grade;
  if (succPct >= 95) grade = "A+";
  else if (succPct >= 90) grade = "A";
  else if (succPct >= 85) grade = "A−";
  else if (succPct >= 80) grade = "B+";
  else if (succPct >= 75) grade = "B";
  else if (succPct >= 70) grade = "B−";
  else if (succPct >= 60) grade = "C+";
  else if (succPct >= 50) grade = "C";
  else if (succPct >= 40) grade = "D";
  else grade = "F";

  return {
    age:p.age, retAge:p.retAge, sex:p.sex, prov:p.prov, sal:p.sal,
    deathAge:p.deathAge, avgDeath:p.sex==="F"?87:84,
    totalSavings:p.rrsp+p.tfsa+p.nr, rrsp:p.rrsp, tfsa:p.tfsa, nr:p.nr,
    retYearBalance:retBal, retBal:retBal,
    qppMonthly:qppM, oasMonthly:oasM, dbPensionMonthly:penMo,
    govMonthly:govM, coveragePct:coverPct, gapMonthly:gapM,
    retSpM:p.retSpM, withdrawalRatePct:wdPct,
    successPct:succPct, succ:mc.succ, grade:grade,
    rMedF:Math.round(mc.medF||0), rP5F:Math.round(mc.var5||0),
    rP25F:Math.round(mc.p25F||0), rP75F:Math.round(mc.p75F||0),
    rP95F:Math.round(mc.p95F||0),
    medRuin:mc.medRuin||999, p5Ruin:mc.p5Ruin||999,
    taxCurrentEffective:taxCurrEff, taxRetirementEffective:taxRetEff,
    taxCurrentMarginal:Math.round(margRate*100),
    margRate:margRate,
    merWeighted:merW, feeCostLifetime:feeCost,
    penType:p.penType, dcBal:p.dcBal, hasPension:p.penType!=="none",
    ptM:p.ptM, ptYrs:p.ptYrs,
    qppAge:p.qppAge, oasAge:p.oasAge,
    inf:p.inf, nSim:5000,
    medRevData:mc.medRevData,
    // Expected return + after-tax (for debt priority)
    expReturn:p.allocR*0.07+(1-p.allocR)*0.035,
    afterTaxReturn:(p.allocR*0.07+(1-p.allocR)*0.035)*(1-margRate*0.5),
  };
}

// ============================================================
// DEBT PRIORITY WATERFALL (adapted from planner for Essentiel)
// ============================================================
function calcMinViableReturn(baseParams){
  var p=Object.assign({},baseParams);
  var lo=0.01,hi=0.15,mid,succMid,itr=0;
  while(hi-lo>0.002&&itr<12){
    mid=(lo+hi)/2;p.eqRet=mid;
    var mc=runMC(p,200);
    succMid=mc?mc.succ:0;
    if(succMid>=0.5)hi=mid; else lo=mid;
    itr++;
  }
  return Math.round((lo+hi)/2*1000)/10;
}

function calcCostOfDelay(baseParams){
  var lostContrib=(baseParams.rrspC||0)+(baseParams.tfsaC||0)+(baseParams.nrC||0);
  var yrsToGrow=baseParams.deathAge-baseParams.retAge;
  var expRet=(baseParams.allocR||0.7)*0.07+(1-(baseParams.allocR||0.7))*0.035-(baseParams.merR||0.015);
  return Math.round(lostContrib*12*Math.pow(1+expRet,yrsToGrow));
}

function buildPriority(D, p, fr) {
  var isQC = p.prov === "QC";
  var margRate = D.margRate || 0.30;
  var expRet = D.expReturn || 0.053;
  var afterTaxRet = D.afterTaxReturn || 0.035;
  var pct = function(v) { return (v * 100).toFixed(1) + "%"; };
  var priorities = [];

  // 1. Employer match (if DC or large)
  if (p._quiz.employer === "large" || p._quiz.employer === "tech") {
    priorities.push({
      name: fr ? "Cotisation employeur (contrepartie)" : "Employer match contribution",
      rate: "50-100%",
      why: fr ? "Rendement instantané de 50-100%. Généralement priorisé." : "Instant 50-100% return. Generally considered first.",
      color: "#2A8C46", priority: 1
    });
  }

  // 2. High-interest debts (>10%)
  (p._report.debts || []).filter(function(d){return d.rate >= 0.10;}).forEach(function(d) {
    var tl = fr ? {cc:"Carte de crédit",student:"Prêt étudiant",car:"Prêt automobile",loc:"Marge de crédit"}
               : {cc:"Credit card",student:"Student loan",car:"Car loan",loc:"Line of credit"};
    priorities.push({
      name: (tl[d.type] || d.type) + " (" + Math.round(d.bal).toLocaleString() + " $)",
      rate: pct(d.rate),
      why: fr ? "Taux de " + pct(d.rate) + " garanti. Le remboursement est généralement priorisé."
             : "Guaranteed " + pct(d.rate) + " rate. Repayment is often favoured.",
      color: "#CC4444", priority: 2
    });
  });

  // 3. RRSP vs TFSA order depends on marginal rate
  if (margRate > 0.4) {
    priorities.push({
      name: fr ? "Régime enregistré d'épargne-retraite" : "Registered Retirement Savings Plan",
      rate: pct(margRate),
      why: fr ? "Taux marginal de " + pct(margRate) + " > 40%. Déduction fiscale élevée."
             : "Marginal rate " + pct(margRate) + " > 40%. High tax deduction.",
      color: "#4680C0", priority: 3
    });
    priorities.push({
      name: fr ? "Compte d'épargne libre d'impôt" : "Tax-Free Savings Account",
      rate: pct(expRet),
      why: fr ? "Croissance libre d'impôt. Après le régime enregistré." : "Tax-free growth. After registered plan.",
      color: "#2A8C46", priority: 4
    });
  } else {
    priorities.push({
      name: fr ? "Compte d'épargne libre d'impôt" : "Tax-Free Savings Account",
      rate: pct(expRet),
      why: fr ? "Taux marginal de " + pct(margRate) + " ≤ 40%. Souvent priorisé." : "Marginal rate " + pct(margRate) + " ≤ 40%. Often favoured.",
      color: "#2A8C46", priority: 3
    });
    priorities.push({
      name: fr ? "Régime enregistré d'épargne-retraite" : "Registered Retirement Savings Plan",
      rate: pct(margRate),
      why: fr ? "Déduction modérée. Après le compte libre d'impôt." : "Moderate deduction. After tax-free account.",
      color: "#4680C0", priority: 4
    });
  }

  // 4. Medium-rate debts (4-10%)
  (p._report.debts || []).filter(function(d){return d.rate >= 0.04 && d.rate < 0.10;}).forEach(function(d) {
    var tl = fr ? {cc:"Carte de crédit",student:"Prêt étudiant",car:"Prêt automobile",loc:"Marge de crédit"}
               : {cc:"Credit card",student:"Student loan",car:"Car loan",loc:"Line of credit"};
    priorities.push({
      name: (tl[d.type] || d.type) + " (" + Math.round(d.bal).toLocaleString() + " $)",
      rate: pct(d.rate),
      why: d.rate > afterTaxRet
        ? (fr ? "Taux > rendement après impôt. Le remboursement est généralement favorisé." : "Rate > after-tax return. Repayment is generally favored.")
        : (fr ? "Taux < rendement. Paiement minimum acceptable." : "Rate < return. Minimum payment acceptable."),
      color: "#B89830", priority: 5
    });
  });

  // 5. Mortgage
  if (p._report.mortBal > 0) {
    var mmr = 0.055;
    priorities.push({
      name: fr ? "Hypothèque (" + Math.round(p._report.mortBal).toLocaleString() + " $)" : "Mortgage (" + Math.round(p._report.mortBal).toLocaleString() + " $)",
      rate: pct(mmr),
      why: mmr > afterTaxRet
        ? (fr ? "Taux > rendement après impôt. Le remboursement accéléré est souvent favorisé." : "Rate > after-tax return. Accelerated repayment is often favored.")
        : (fr ? "Taux < rendement après impôt. L'investissement est souvent favorisé." : "Rate < after-tax return. Investing is often favored."),
      color: "#B89830", priority: 6
    });
  }

  return priorities;
}

    spend:{mo:D.retSpM,gap:D.gapMonthly,wd:D.withdrawalRatePct},
    results:{pct:D.successPct,grade:D.grade,med:D.rMedF,p5:D.rP5F,p25:D.rP25F,p75:D.rP75F},
    tax:{eff:D.taxCurrentEffective,retEff:D.taxRetirementEffective},
    fees:{mer:D.merWeighted,cost:D.feeCostLifetime}
  };

  var sys = "You narrate buildfi.ca Essentiel reports.\nRULES: Observational only. CONDITIONAL tense. Never directive.\nCite numbers. Grade 10 reading. Short sentences.\nNo acronyms: " + gP + ", " + oN + ".\nJSON only. No markdown.";

  var usr = "LANG: " + (fr ? "French (vous)" : "English") + "\n" + confInstr + "\n" + winInstr + "\n" + fixInstr + "\n"
    + (wInstr ? "WORRIES: " + wInstr + "\n" : "") + (cplSlot ? cplSlot + "\n" : "") + (propSlot ? propSlot + "\n" : "") + (ptSlot ? ptSlot + "\n" : "")

function f$(n) {
  if (n == null || isNaN(n)) return "\u2014";
  return (n < 0 ? "-" : "") + Math.abs(Math.round(n)).toString().replace(/\B(?=(\d{3})+(?!\d))/g, " ") + " $";
}

function gCol(s) { return s >= 0.9 ? "#2A8C46" : s >= 0.75 ? "#B89830" : "#CC4444"; }

function render() {
  var app = document.getElementById("app");
  var s = STATE, q = s.quiz, fr = s.lang === "fr";
  var t = function(f, e) { return fr ? f : e; };

  if (s.showPaywall && s.reportData && !s.paid) {
    app.innerHTML = renderPaywall(s.reportData, s.lang);
    return;
  }
  if (s.showPaywall && s.reportData && !s.paid) {
    var reportHTML = renderReport(s.reportData, s.mc, s.quiz, s.ai, s.aiLoading, s.lang, s.costDelay||0, s.minReturn||0);
    app.innerHTML = renderBlurredReport(reportHTML, s.reportData, s.lang);
    return;
  }
  if (s.showReport && s.reportData) {
    app.innerHTML = renderReport(s.reportData, s.mc, s.quiz, s.ai, s.aiLoading, s.lang, s.costDelay||0, s.minReturn||0);
    return;
  }

  if (s.step === 8) {
    app.innerHTML = renderLoading(fr);
    if (!s.computed) {
      s.computed = true;
      setTimeout(function() {
        var params = translateToMC(q);
        var mc = runMC(params, 5000);
        var v = validateMC(mc, params);
        if (!v.valid) {
          app.innerHTML = '<div style="max-width:480px;margin:60px auto;padding:20px;text-align:center"><h2 style="color:#CC4444">' + t("Erreur", "Error") + '</h2><p style="margin:16px 0;color:#555">' + t("Nous n'avons pas pu générer votre rapport. Veuillez vérifier vos réponses.", "We couldn't generate your report. Please check your answers.") + '</p><p style="font-size:11px;color:#999">' + v.errors.join(", ") + '</p><button class="pbtn" onclick="STATE.step=7;STATE.computed=false;render()">' + t("Retour", "Back") + '</button></div>';
          return;
        }
        STATE.mc = mc;
        STATE.reportData = extractReportData(mc, params);
        STATE.costDelay = calcCostOfDelay(params);
        STATE.minReturn = calcMinViableReturn(params);
        STATE.aiLoading = false;
        STATE.showPaywall = true;
        render();
      }, 100);
    }
    return;
  }

  app.innerHTML = renderQuiz(s.step, q, s.lang);
}

function go(step) {
  STATE.step = step;
  window.scrollTo({top:0, behavior:"smooth"});
  render();
}

var _uqTimer = null;
function uq(key, val) {
  STATE.quiz[key] = val;
  if (typeof val === "number") {
    clearTimeout(_uqTimer);
    _uqTimer = setTimeout(render, 600);
  } else {
    render();
  }
}

function setDebtField(type, field, val) {
  var q = STATE.quiz;
  var d = q.debts.find(function(x){return x.type===type;});
  if (!d) { d = {type:type, amount:0, minPayment:0}; q.debts.push(d); }
  d[field] = val || 0;
  // Remove debt from array if both amount and minPayment are 0
  q.debts = q.debts.filter(function(x){return x.amount > 0 || x.minPayment > 0;});
  // But we don't re-render on zero because the input needs to stay visible
}

function toggleWorry(w) {
  var q = STATE.quiz;
  if (q.worries.indexOf(w) >= 0) q.worries = q.worries.filter(function(x){return x!==w;});

  render();
}

  fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {"Content-Type": "application/json", "x-api-key": apiKey, "anthropic-version": "2023-06-01", "anthropic-dangerous-direct-browser-access": "true"},
    body: JSON.stringify({model:"claude-opus-4-6", max_tokens:1800, system:prompt.sys, messages:[{role:"user",content:prompt.usr}]})
  }).then(function(r){return r.json();}).then(function(d) {
    if (d.error) { alert("API Error: " + (d.error.message||JSON.stringify(d.error))); return; }
    var tx = (d.content||[]).map(function(b){return b.type==="text"?b.text:"";}).join("").replace(/```json|```/g,"").trim();
    var j0 = tx.indexOf("{"), j1 = tx.lastIndexOf("}");
    if (j0 >= 0 && j1 > j0) STATE.ai = JSON.parse(tx.substring(j0, j1+1));
  }).catch(function(e){console.error("AI error:",e);alert("Erreur: "+e.message);}).finally(function(){
    STATE.aiLoading = false;
    render();
  });
}

// ============================================================
// BOOT
// ============================================================
render();
</script>
</body>
</html>
