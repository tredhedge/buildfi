<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>buildfi.ca — Rapport Intermédiaire</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',-apple-system,sans-serif;background:#FEFCF9;color:#1A1A1A}
:root{
  --g:#C4944A;--gl:#D4A85A;--gn:#2A8C46;--gnl:#3AA856;--am:#B89830;
  --rd:#CC4444;--bl:#4680C0;--pr:#7C60B8;--tx:#1A1A1A;--ts:#555;--tm:#888;
  --bg:#FEFCF9;--bgc:#fff;--bd:#E8E0D4;--bdl:#F0ECE4;
  --gbg:rgba(196,148,74,.08);--gnbg:rgba(42,140,70,.06);--ambg:rgba(184,152,48,.06);
  --rdbg:rgba(204,68,68,.06);--bga:rgba(124,96,184,.04);
  --blbg:rgba(70,128,192,.06);--cpbg:rgba(124,96,184,.06);
}
.qs{animation:fadeIn .4s ease-out}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
input[type=range]{-webkit-appearance:none;width:100%;height:6px;background:var(--bd);border-radius:3px;outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:24px;height:24px;border-radius:50%;background:var(--g);cursor:pointer;box-shadow:0 2px 6px rgba(196,148,74,.3)}
.pbtn{display:block;width:100%;padding:14px;border-radius:12px;border:none;background:linear-gradient(135deg,var(--g),var(--gl));color:#fff;font-size:15px;font-weight:700;cursor:pointer;margin-top:20px;transition:transform .15s,box-shadow .15s}
.pbtn:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(196,148,74,.25)}
.pbtn-sec{display:block;width:100%;padding:12px;border-radius:10px;border:1.5px solid var(--bd);background:var(--bgc);font-size:14px;font-weight:600;cursor:pointer;margin-top:10px;color:var(--ts);transition:border-color .2s}
.pbtn-sec:hover{border-color:var(--g)}
.card{background:var(--bgc);border:2px solid var(--bd);border-radius:12px;padding:16px;margin-bottom:10px;cursor:pointer;transition:all .2s}
.card:hover{border-color:var(--gl);background:#FDF8F0}
.card.sel{border-color:var(--g);background:linear-gradient(135deg,#FFF8ED,#FDF3E0);box-shadow:0 3px 14px rgba(196,148,74,.25);transform:scale(1.02)}
.chip{display:inline-block;padding:8px 16px;border-radius:20px;border:2px solid var(--bd);background:var(--bgc);font-size:13px;cursor:pointer;transition:all .2s;margin:3px}
.chip:hover{border-color:var(--gl);background:#FDF8F0}
.chip.sel{border-color:var(--g);background:linear-gradient(135deg,#FFF8ED,#FDF3E0);color:var(--g);font-weight:700;box-shadow:0 2px 8px rgba(196,148,74,.2)}
.back-btn{padding:8px 16px;border-radius:8px;border:1px solid var(--bd);background:var(--bgc);font-size:11px;font-weight:600;cursor:pointer;color:var(--ts)}
.loading-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--g);margin:0 3px;animation:bounce .6s infinite alternate}
.loading-dot:nth-child(2){animation-delay:.2s}
.loading-dot:nth-child(3){animation-delay:.4s}
@keyframes bounce{to{opacity:.3;transform:translateY(-6px)}}
.fld-block{margin-bottom:18px}
.fld-label{font-size:12px;font-weight:700;color:var(--ts);display:block;margin-bottom:5px;letter-spacing:.2px}
.fld-sub{font-size:11px;color:var(--tm);margin-top:3px;line-height:1.5}
.inp{width:100%;padding:11px 13px;border-radius:8px;border:1.5px solid var(--bd);font-size:15px;font-family:'DM Sans',sans-serif;background:var(--bgc);color:var(--tx);transition:border-color .15s}
.inp:focus{outline:none;border-color:var(--g);box-shadow:0 0 0 3px rgba(196,148,74,.1)}
.inp-sm{padding:9px 11px;font-size:13px}
.section-head{font-size:11px;font-weight:800;color:var(--g);text-transform:uppercase;letter-spacing:1.2px;padding:14px 0 8px;border-bottom:2px solid var(--gbg);margin:20px 0 14px}
.phase-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:20px;background:var(--gbg);color:var(--g);font-size:11px;font-weight:700;letter-spacing:.5px;margin-bottom:20px}
.info-box{background:var(--gbg);border:1px solid rgba(196,148,74,.2);border-radius:10px;padding:14px 16px;margin-bottom:16px}
.info-box-note{font-size:11px;color:var(--tm);font-style:italic;margin-top:8px}
@media print{body{background:#fff}.no-print{display:none!important}}
@media(min-width:900px){
  body{font-size:16px}
  .qs h2{font-size:24px!important}
  .qs label{font-size:15px!important}
  .pbtn{font-size:16px!important;padding:18px 20px!important}
  .back-btn{font-size:13px!important;padding:10px 20px!important}
}
@media(max-width:640px){
  .rpt-grid3{grid-template-columns:1fr 1fr!important}
  .rpt-grid2{grid-template-columns:1fr!important}
  .rpt-flex{flex-direction:column!important}
  .rpt-donut{flex-direction:column!important;align-items:center!important;gap:16px!important}
  .rpt-cta-grid{grid-template-columns:1fr!important}
  .tbl-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
}
@media(max-width:480px){
  body{font-size:14px}
  h1{font-size:22px!important}
  h2{font-size:19px!important}
  .rpt-grid3{grid-template-columns:1fr!important}
}
</style>
<script src="/logo.js"></script>

<body>
<div id="app"></div>
<script>
// ============================================================
// THIN CLIENT -- No MC engine. All computation runs server-side.
// Quiz answers sent to /api/checkout -> Stripe -> webhook -> MC -> report -> email
// ============================================================

// -- Constants for quiz UI and mock preview --
var DEBT_RATES = {cc:0.1999, student:0.055, car:0.065, loc:0.075};
var COL_ADJ = {QC:1,ON:1.15,BC:1.35,AB:1.05,MB:0.92,SK:0.90,NS:0.95,NB:0.88,NL:0.93,PE:0.87,NT:1.25,YT:1.20,NU:1.40};
var PMED = {QC:380000,ON:620000,BC:850000,AB:440000,MB:320000,SK:310000,NS:360000,NB:260000,NL:270000,PE:280000,NT:400000,YT:420000,NU:380000};

function amortDebt(bal,rate,pay){
  if(bal<=0)return{months:0,totalInt:0,feasible:true};
  var mr=rate/12,b=bal,ti=0,mo=0;
  if(pay<=b*mr&&mr>0)return{months:999,totalInt:Math.round(bal*rate*50),feasible:false};
  while(b>0.01&&mo<600){var ii=b*mr;b-=Math.min(b,pay-ii);ti+=ii;mo++;}
  return{months:mo,totalInt:Math.round(ti),feasible:true};
}
function defMinPay(type,bal){
  if(type==="cc")return Math.max(Math.round(bal*0.02),25);
  if(type==="student")return Math.max(Math.round(bal/120),50);
  if(type==="car")return Math.max(Math.round(bal/60),100);
  return Math.max(Math.round(bal*0.01),Math.round(bal*(DEBT_RATES[type]||0.08)/12));
}

// -- Mock report data for blurred paywall preview --
function generateMockPreviewInter(q) {
  var age = q.age || 35, retAge = q.retAge || 65, sex = q.sex || "M";
  var prov = q.prov || "QC", sal = q.income || 70000;
  var col = COL_ADJ[prov] || 1;
  var rrsp = q.rrsp || 0, tfsa = q.tfsa || 0, nr = q.nr || 0;
  var lira = q.lira || 0, dcBal = q.dcBal || 0, fhsaBal = q.fhsaBal || 0;
  var mc = q.monthlyContrib || 0;
  var cRrsp = 0, cTfsa = 0, cNr = 0, cLira = 0;
  if (q.couple === "yes") { cRrsp = q.cRrsp || 0; cTfsa = q.cTfsa || 0; cNr = q.cNr || 0; cLira = q.cLira || 0; }
  var tot = rrsp + tfsa + nr + lira + dcBal + fhsaBal + cRrsp + cTfsa + cNr + cLira;
  var srcs = q.sources || ["employed"];
  var ccpcIncome = 0;
  if (srcs.indexOf("ccpc") >= 0) ccpcIncome = Math.max(0, (q.bizRevenue || 0) - (q.bizExpenses || 0));
  var totalIncome = sal + ccpcIncome;
  var retSpM;
  if (q.lifestyle === "cozy") retSpM = Math.round(3000 * col);
  else if (q.lifestyle === "premium") retSpM = Math.round(7500 * col);
  else if (q.lifestyle === "custom" && q.retSpMCustom > 0) retSpM = q.retSpMCustom;
  else retSpM = Math.round(5000 * col);
  var penType = q.penType || "none", penM = 0;
  var emp = q.employer || "x";
  if (penType === "db") { penM = q.penM || Math.round(sal * 0.02 * Math.min(35, retAge - 25) / 12); }
  else if (emp === "gov" && penType === "none") { penType = "db"; penM = Math.round(sal * 0.02 * Math.min(35, retAge - 25) / 12); }
  else if (penType === "dc" || emp === "large" || emp === "tech") { if (!dcBal) dcBal = Math.round(sal * 0.06 * Math.min(20, Math.max(0, age - 25))); }
  var qppAge = q.qppAge || Math.max(60, Math.min(70, retAge < 60 ? 65 : retAge));
  var oasAge = q.oasAge || Math.max(65, Math.min(70, retAge < 65 ? 65 : retAge));
  var qppM = Math.round(1508 * Math.min(1, (totalIncome / 74600)) * Math.min(1, Math.max(0, age - 18) / 40) * (qppAge <= 60 ? 0.64 : qppAge <= 65 ? 1.0 : 1.42));
  var oasM = oasAge <= 65 ? 742 : Math.round(742 * 1.36);
  var govM = qppM + oasM + penM;
  var gapM = Math.max(0, retSpM - govM);
  var yrs = Math.max(0, retAge - age);
  var fvSav = (tot + mc * 12 * yrs) * Math.pow(1.05, yrs) * 0.85;
  var retBal = Math.round(fvSav + dcBal);
  var wdRate = retBal > 0 ? (gapM * 12) / retBal : 99;
  var roughSucc;
  if (wdRate <= 0.03) roughSucc = 0.95;
  else if (wdRate <= 0.04) roughSucc = 0.85;
  else if (wdRate <= 0.05) roughSucc = 0.70;
  else if (wdRate <= 0.06) roughSucc = 0.55;
  else if (wdRate <= 0.08) roughSucc = 0.35;
  else roughSucc = 0.15;
  var succPct = Math.round(roughSucc * 100);
  var grade;
  if (succPct >= 95) grade = "A+";
  else if (succPct >= 90) grade = "A";
  else if (succPct >= 85) grade = "A−";
  else if (succPct >= 80) grade = "B+";
  else if (succPct >= 75) grade = "B";
  else if (succPct >= 70) grade = "B−";
  else if (succPct >= 60) grade = "C+";
  else if (succPct >= 50) grade = "C";
  else if (succPct >= 40) grade = "D";
  else grade = "F";
  var debts = ((q.debts || []).filter(function(d){return (d.amount||0)>0;})).map(function(d){
    var bal = d.amount, rate = d.rate > 0 ? d.rate / 100 : DEBT_RATES[d.type] || 0.08;
    var minPay = d.minPayment > 0 ? d.minPayment : defMinPay(d.type, bal);
    var am = amortDebt(bal, rate, minPay);
    return {type:d.type, bal:bal, rate:rate, minPay:minPay, months:am.months, totalInt:am.totalInt, feasible:am.feasible, annualCost:Math.round(bal*rate)};
  });
  var deathAge = sex === "F" ? 92 : 90;
  return {
    age:age, retAge:retAge, sex:sex, prov:prov, sal:sal, deathAge:deathAge,
    avgDeath: sex === "F" ? 87 : 84,
    totalSavings: Math.round(tot),
    rrsp:Math.round(rrsp), tfsa:Math.round(tfsa), nr:Math.round(nr),
    lira:Math.round(lira), dcBal:Math.round(dcBal), fhsaBal:Math.round(fhsaBal),
    retBal:retBal, retYearBalance:retBal,
    qppMonthly:qppM, oasMonthly:oasM, dbPensionMonthly:penM,
    govMonthly:govM, coveragePct:Math.min(100, Math.round(govM/Math.max(1,retSpM)*100)),
    gapMonthly:gapM, retSpM:retSpM,
    withdrawalRatePct: retBal > 0 ? Math.round(wdRate * 1000) / 10 : 99,
    successPct:succPct, succ:roughSucc, grade:grade,
    rMedF:Math.round(retBal * 0.4), rP5F:0, rP25F:Math.round(retBal*0.15),
    rP75F:Math.round(retBal*0.6), rP95F:Math.round(retBal*0.9),
    medRuin: roughSucc > 0.5 ? 999 : Math.round(retAge + (retBal / Math.max(1, gapM * 12))),
    p5Ruin: roughSucc > 0.5 ? 999 : Math.round(retAge + (retBal / Math.max(1, gapM * 12)) * 0.7),
    taxCurrentEffective: Math.round(Math.min(40, Math.max(15, totalIncome * 0.00003))),
    taxRetirementEffective: Math.round(Math.min(30, Math.max(8, retSpM * 12 * 0.000025))),
    taxCurrentMarginal: Math.round(Math.min(53, Math.max(28, totalIncome * 0.000035))),
    margRate: Math.min(0.53, Math.max(0.28, totalIncome * 0.0000035)),
    merWeighted: 0.015,
    feeCostLifetime: Math.round(0.015 * retBal * (deathAge - retAge)),
    penType:penType, hasPension: penType !== "none",
    ptM: q.parttime === "yes" ? (q.parttimeAmount || 1500) : q.parttime === "maybe" ? 800 : 0,
    ptYrs: q.parttime === "yes" ? (q.parttimeYears || 5) : q.parttime === "maybe" ? 3 : 0,
    qppAge:qppAge, oasAge:oasAge,
    inf:0.021, nSim:5000, medRevData:[],
    expReturn: 0.06, afterTaxReturn: 0.04,
    _isMockPreview: true
  };
}

// -- Paywall renderer --
function renderPaywall(D, lang) {
  var fr = lang === "fr";
  var t = function(f, e) { return fr ? f : e; };
  var gradeColor = D.successPct >= 80 ? "#1a7a4c" : D.successPct >= 60 ? "#b8860b" : "#b91c1c";
  var gradeLabel = D.successPct >= 80 ? t("Votre plan est solide","Your plan is solid") : D.successPct >= 60 ? t("Votre plan a du potentiel","Your plan has potential") : t("Votre plan a besoin d'ajustements","Your plan needs adjustments");
  var h = '<div style="max-width:560px;margin:0 auto;padding:40px 24px;font-family:DM Sans,sans-serif">';
  h += '<div style="text-align:center;margin-bottom:32px">';
  h += '<div style="display:flex;justify-content:center">' + (typeof logoSVG !== "undefined" ? logoSVG("md","light") : '<div style="font-size:22px;font-weight:800;color:var(--g)">buildfi.ca</div>') + '</div>';
  h += '<div style="font-size:11px;color:var(--tm);letter-spacing:1.2px;text-transform:uppercase;margin-top:8px">' + t("Rapport Intermédiaire","Intermediate Report") + '</div>';
  h += '</div>';
  h += '<div style="background:linear-gradient(135deg,#1a2744,#2c3e6b);border-radius:20px;padding:36px;text-align:center;margin-bottom:24px">';
  h += '<div style="font-size:12px;color:#b8860b;font-weight:600;text-transform:uppercase;letter-spacing:2px;margin-bottom:16px">' + t("VOTRE NOTE DE RETRAITE","YOUR RETIREMENT GRADE") + '</div>';
  h += '<div style="font-size:80px;font-weight:800;color:#fff;line-height:1;margin-bottom:12px">' + D.grade + '</div>';
  h += '<div style="font-size:16px;color:rgba(255,255,255,0.8);margin-bottom:8px">' + D.successPct + '% ' + t("de scénarios réussis","of scenarios succeeded") + '</div>';
  h += '<div style="display:inline-block;background:' + gradeColor + ';color:#fff;padding:6px 16px;border-radius:20px;font-size:13px;font-weight:600">' + gradeLabel + '</div>';
  h += '</div>';
  h += '<div style="background:#faf8f4;border-radius:16px;padding:24px;margin-bottom:24px;border:1px solid #e8e4db">';
  h += '<div style="font-size:15px;font-weight:700;color:#1a2744;margin-bottom:16px">' + t("Votre rapport complet inclut :","Your full report includes:") + '</div>';
  var items = fr ? [
    "16 sections d'analyse approfondie",
    "Comparaison de 5 stratégies de décaissement",
    "Narration financière personnalisée par IA",
    "Projections en éventail sur votre horizon de vie",
    "Comparaisons avec les repères canadiens (StatCan)",
    "Anatomie fiscale et cascade de priorités",
    "Analyse de vos 5 000 scénarios simulés"
  ] : [
    "16 sections of in-depth analysis",
    "5-strategy decumulation comparison",
    "AI-powered personalized financial narration",
    "Fan chart projections across your life horizon",
    "Benchmark comparisons (StatCan data)",
    "Tax anatomy and priority cascade",
    "Analysis of your 5,000 simulated scenarios"
  ];
  items.forEach(function(item) {
    h += '<div style="display:flex;align-items:flex-start;gap:10px;margin-bottom:10px">';
    h += '<div style="color:#1a7a4c;font-size:16px;margin-top:1px">✔</div>';
    h += '<div style="font-size:14px;color:#444;line-height:1.5">' + item + '</div>';
    h += '</div>';
  });
  h += '</div>';
  h += '<div style="text-align:center;margin-bottom:20px">';
  h += '<div style="font-size:13px;color:#888;margin-bottom:8px">' + t("Rapport personnalisé — paiement unique","Personalized report — one-time payment") + '</div>';
  h += '<div style="font-size:42px;font-weight:800;color:#1a2744;margin-bottom:4px">69 <span style="font-size:20px">$</span></div>';
  h += '<div style="font-size:12px;color:#888;margin-bottom:20px">CAD ' + t("taxes incluses","taxes included") + '</div>';
  h += '<div id="email-gate" style="margin-bottom:16px">';
  h += '<input id="buyer-email" type="email" placeholder="' + t("Votre adresse courriel","Your email address") + '" style="width:100%;padding:14px;border-radius:10px;border:1px solid #ddd;font-size:15px;box-sizing:border-box;margin-bottom:12px">';
  h += '<button onclick="startCheckout()" style="width:100%;padding:16px;background:linear-gradient(135deg,#b8860b,#d4a520);color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer">';
  h += t("Obtenir mon rapport complet — 69 $","Get my full report — $69");
  h += '</button>';
  h += '</div>';
  h += '<div style="font-size:12px;color:#aaa">' + t("Paiement unique — livraison immédiate par courriel","One-time payment — instant delivery by email") + '</div>';
  h += '<div style="margin-top:20px;text-align:center"><button onclick="localStorage.removeItem(&quot;buildfi_quiz_inter&quot;);location.reload();" style="padding:10px 24px;background:transparent;border:1px solid #ccc;border-radius:8px;color:#888;font-size:13px;cursor:pointer;font-family:DM Sans,sans-serif">' + t("Recommencer le questionnaire","Restart questionnaire") + '</button></div>';
  h += '</div>';
  h += '</div>';
  return h;
}

// -- Stripe checkout --
function startCheckout() {
  var email = document.getElementById("buyer-email").value.trim();
  if (!email || !email.includes("@")) {
    alert(STATE.lang === "fr" ? "Veuillez entrer une adresse courriel valide." : "Please enter a valid email address.");
    return;
  }
  var btn = document.querySelector("#email-gate button");
  btn.disabled = true;
  btn.textContent = STATE.lang === "fr" ? "Redirection..." : "Redirecting...";
  fetch("/api/checkout", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      quizAnswers: STATE.quiz,
      lang: STATE.lang,
      email: email,
      tier: "intermediaire"
    })
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    if (data.url) {
      window.location.href = data.url;
    } else {
      alert(STATE.lang === "fr" ? "Erreur. Veuillez réessayer." : "Error. Please try again.");
      btn.disabled = false;
      btn.textContent = STATE.lang === "fr" ? "Obtenir mon rapport complet — 69 $" : "Get my full report — $69";
    }
  })
  .catch(function() {
    alert(STATE.lang === "fr" ? "Erreur. Veuillez réessayer." : "Error. Please try again.");
    btn.disabled = false;
    btn.textContent = STATE.lang === "fr" ? "Obtenir mon rapport complet — 69 $" : "Get my full report — $69";
  });
}

// ============================================================
// APPLICATION STATE
// ============================================================
var STATE={
  step:0,lang:"fr",
  quiz:{
    age:42,retAge:63,sex:"M",prov:"QC",couple:"no",cAge:0,cSex:"F",
    sources:["employed"],employer:"large",income:80000,
    cIncome:0,cSource:"employed",cEmployer:"",
    rrsp:45000,tfsa:22000,nr:5000,lira:0,dcBal:0,monthlyContrib:600,
    cRrsp:0,cTfsa:0,cNr:0,cLira:0,
    debts:[],homeowner:false,homeValue:0,mortgage:0,mortgageAmort:20,
    heloc:0,helocRate:6.5,hasRental:false,
    rentalValue:0,rentalMortgage:0,rentalAmort:20,rentalIncome:0,rentalExpenses:0,
    rentalDpaAccum:0,rentalSaleAge:0,
    lifestyle:"active",retSpMCustom:0,risk:"balanced",allocCustom:70,retSpM:0,
    parttime:"no",parttimeAmount:0,parttimeYears:0,
    worries:[],objective:"",
    confidence:3,decaissement:"minimal",
    fhsaBal:0,fhsaContrib:0,fhsaForHome:false,fhsaHomeAge:0,
    penType:"none",penM:0,penIdx:false,penBridge:false,penYrs:0,
    cRetAge:63,cPenType:"none",cPenM:0,cQppAge:65,cOasAge:65,
    downsizingAge:0,downsizingProceeds:0,dpaOn:false,
    qppAge:65,oasAge:65,
    lifeInsBenefit:0,lifeInsPremium:0,
    cLifeInsBenefit:0,cLifeInsPremium:0,succObjective:"neutral",
    bizRevenue:0,bizExpenses:0,bizBNR:0,bizRemun:"mix",bizSalaryPct:50,
    bizGrowth:2,bizInvAlloc:40,bizExtractYrs:10,
    bizDebt:0,bizSaleAge:0,bizSalePrice:0,bizACB:100,bizLCGE:false,
    ippOn:false,ippBal:0
  },
  mc:null,reportData:null,computed:false,
  showPaywall:false,
  activeBlocks:[]
};

function detectBlocks(q){
  var blocks=[];
  if((q.lira||0)>0||(q.fhsaBal||0)>0||(q.fhsaContrib||0)>0)blocks.push("A");
  if((q.penType&&q.penType!=="none")||q.employer==="gov")blocks.push("B");
  if(q.couple==="yes")blocks.push("C");
  if(q.homeowner)blocks.push("D");

}

function f$(n){
  if(n==null||isNaN(n))return"\u2014";
  var s=(n<0?"-":"")+Math.abs(Math.round(n)).toString().replace(/\B(?=(\d{3})+(?!\d))/g," ")+" $";
  return s;
}
function fPct(n){if(n==null||isNaN(n))return"\u2014";return Math.round(n)+"%";}
function gCol(s){return s>=0.9?"#2A8C46":s>=0.75?"#B89830":"#CC4444";}

function render(){
  var app=document.getElementById("app");
  var s=STATE,q=s.quiz,fr=s.lang==="fr";
  document.documentElement.lang=s.lang;
  document.title=fr?"buildfi.ca \u2014 Rapport Interm\u00e9diaire":"buildfi.ca \u2014 Intermediate Report";
  saveState();

  if(s.showPaywall&&s.reportData){
    app.innerHTML=renderPaywall(s.reportData,s.lang);
    return;
  }
  if(s.step==="loading"){
    app.innerHTML=renderLoading(fr);
    if(!s.computed){
      s.computed=true;
      STATE.reportData=generateMockPreviewInter(q);
      STATE.showPaywall=true;
      render();
    }
    return;
  }
  app.innerHTML=renderQuiz(s.step,q,s.lang,s.activeBlocks);
}

function go(step){
  STATE.step=step;
  saveState();
  window.scrollTo({top:0,behavior:"smooth"});
  render();
}
function uq(key,val){STATE.quiz[key]=val;render();}
function setDebtField(type,field,val){
  var q=STATE.quiz;
  var d=q.debts.find(function(x){return x.type===type;});
  if(!d){d={type:type,amount:0,minPayment:0,rate:(DEBT_RATES[type]||0.08)*100};q.debts.push(d);}
  d[field]=val||0;
  q.debts=q.debts.filter(function(x){return(x.amount||0)>0||(x.minPayment||0)>0;});
  render();
}
function toggleWorry(w){
  var q=STATE.quiz;
  if(q.worries.indexOf(w)>=0)q.worries=q.worries.filter(function(x){return x!==w;});
  else if(q.worries.length<3)q.worries.push(w);
  render();
}
function goConditional(){
  var blocks=STATE.activeBlocks=detectBlocks(STATE.quiz);
  if(blocks.length===0){go("loading");return;}
  go("B"+blocks[0]);
}
function goNextBlock(current){
  var blocks=STATE.activeBlocks;
  var idx=blocks.indexOf(current);
  if(idx>=0&&idx<blocks.length-1)go("B"+blocks[idx+1]);
  else go("loading");
}
function goPrevBlock(current){
  var blocks=STATE.activeBlocks;
  var idx=blocks.indexOf(current);
  if(idx>0)go("B"+blocks[idx-1]);
  else go(7);
}
function toggleSource(v){
  var s=STATE.quiz.sources||["employed"];
  var idx=s.indexOf(v);
  if(v==="retired"){STATE.quiz.sources=["retired"];render();return;}
  s=s.filter(function(x){return x!=="retired";});
  if(idx>=0)s=s.filter(function(x){return x!==v;});
  else s.push(v);
  if(s.length===0)s=["employed"];
  STATE.quiz.sources=s;render();
}

      +'<div><label class="fld-label">'+t("Prestation au décès","Death benefit")+' ($)</label>'
      +'<input class="inp inp-sm" type="number" min="0" step="10000" value="'+(q.lifeInsBenefit||0)+'" oninput="uq(\'lifeInsBenefit\',+this.value)" /></div>'
      +'<div><label class="fld-label">'+t("Prime mensuelle","Monthly premium")+' ($)</label>'
      +'<input class="inp inp-sm" type="number" min="0" step="10" value="'+(q.lifeInsPremium||0)+'" oninput="uq(\'lifeInsPremium\',+this.value)" /></div>'
      +'</div>'
      +(q.couple==="yes"?'<div style="border-top:1px solid var(--bdl);margin-top:12px;padding-top:12px">'
        +'<div style="font-size:11px;font-weight:700;color:var(--pr);margin-bottom:8px">'+t("Conjoint·e","Partner")+'</div>'
        +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">'
        +'<div><label class="fld-label">'+t("Prestation au décès","Death benefit")+' ($)</label>'
        +'<input class="inp inp-sm" type="number" min="0" step="10000" value="'+(q.cLifeInsBenefit||0)+'" oninput="uq(\'cLifeInsBenefit\',+this.value)" /></div>'
        +'<div><label class="fld-label">'+t("Prime mensuelle","Monthly premium")+' ($)</label>'
        +'<input class="inp inp-sm" type="number" min="0" step="10" value="'+(q.cLifeInsPremium||0)+'" oninput="uq(\'cLifeInsPremium\',+this.value)" /></div>'
        +'</div></div>':'')
      +'</div>'
      +'<div style="background:var(--bgc);border:1px solid var(--bd);border-radius:12px;padding:18px;margin-bottom:14px">'
      +'<div class="section-head">'+t("Objectif successoral","Estate objective")+'</div>'
      +[{v:"maximize",l:t("Maximiser la succession","Maximize estate"),d:t("Préserver pour les héritiers","Preserve for heirs")},
        {v:"neutral",l:t("Pas de préférence","No preference"),d:t("Équilibre consommation/succession","Balance consumption/estate")},
        {v:"consume",l:t("Consommer les actifs","Consume assets"),d:t("Profiter au maximum, léguer le résiduel","Enjoy fully, bequeath remainder")}]
      .map(function(o){return'<div class="card'+(q.succObjective===o.v?" sel":"")+'" onclick="uq(\'succObjective\',\''+o.v+'\')" style="padding:12px 14px"><div style="font-weight:600;font-size:13px">'+o.l+'</div><div style="font-size:11px;color:var(--ts);margin-top:2px">'+o.d+'</div></div>';}).join("")
      +'</div>'
      +'<button class="pbtn" onclick="goNextBlock(\'F\')">'+t("Continuer","Continue")+'</button>'
      +'<button class="back-btn" onclick="goPrevBlock(\'F\')" style="margin-top:10px;width:100%;text-align:center">'+t("Retour","Back")+'</button>'
    ,"F");
  }

  // ── BLOC G: CCPC ─────────────────────────────────────────
  if(step==="BG"){
    var remunCards=[
      {v:"salary",l:t("Salaire pur","Salary only"),d:t("100% salaire, cotisations RRQ max.","100% salary, max QPP contributions")},
      {v:"dividend",l:t("Dividendes purs","Dividends only"),d:t("100% dividendes, pas de cotisation RRQ","100% dividends, no QPP contribution")},
      {v:"mix",l:t("Mixte","Mixed"),d:t("Combinaison optimale salaire/dividendes","Optimal salary/dividend combination")}
    ].map(function(o){return'<div class="card'+(q.bizRemun===o.v?" sel":"")+'" onclick="uq(\'bizRemun\',\''+o.v+'\')" style="padding:12px 14px"><div style="font-weight:600;font-size:13px">'+o.l+'</div><div style="font-size:11px;color:var(--ts);margin-top:2px">'+o.d+'</div></div>';}).join("");
    return wrap(
      '<div class="phase-badge">'+t("Analyse corporative — CCPC","Corporate analysis — CCPC")+'</div>'
      +'<h2 style="font-size:20px;font-weight:700;margin-bottom:6px">'+t("Votre société par actions","Your corporation")+'</h2>'
      +'<p style="font-size:13px;color:var(--ts);margin-bottom:22px;line-height:1.6">'+t("La planification corporative influence la rémunération optimale, la croissance des BNR et la stratégie de sortie.","Corporate planning influences optimal compensation, retained earnings growth, and exit strategy.")+'</p>'
      +'<div style="background:var(--bgc);border:1px solid var(--bd);border-radius:12px;padding:18px;margin-bottom:14px">'
      +'<div class="section-head">'+t("Revenus et BNR","Revenue and RE")+'</div>'
      +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">'
      +'<div><label class="fld-label">'+t("Revenus bruts annuels","Annual gross revenue")+' ($)</label>'
      +'<input class="inp inp-sm" type="number" min="0" step="5000" value="'+(q.bizRevenue||0)+'" oninput="uq(\'bizRevenue\',+this.value)" /></div>'
      +'<div><label class="fld-label">'+t("Dépenses annuelles","Annual expenses")+' ($)</label>'
      +'<input class="inp inp-sm" type="number" min="0" step="5000" value="'+(q.bizExpenses||0)+'" oninput="uq(\'bizExpenses\',+this.value)" /></div>'
      +'<div><label class="fld-label">'+t("Bénéfices non répartis (BNR)","Retained earnings (RE)")+' ($)</label>'
      +'<input class="inp inp-sm" type="number" min="0" step="10000" value="'+(q.bizBNR||0)+'" oninput="uq(\'bizBNR\',+this.value)" /></div>'
      +'<div><label class="fld-label">'+t("Croissance annuelle prévue (%)","Expected annual growth (%)")+'</label>'
      +'<input class="inp inp-sm" type="number" min="0" max="30" value="'+(q.bizGrowth||2)+'" oninput="uq(\'bizGrowth\',+this.value)" /></div>'
      +'</div></div>'
      +'<div style="background:var(--bgc);border:1px solid var(--bd);border-radius:12px;padding:18px;margin-bottom:14px">'
      +'<div class="section-head">'+t("Stratégie de rémunération","Compensation strategy")+'</div>'
      +remunCards
      +(q.bizRemun==="mix"?'<div style="margin-top:12px"><label class="fld-label">'+t("Portion en salaire","Salary portion")+' — '+q.bizSalaryPct+'%</label>'
        +'<input type="range" min="10" max="90" value="'+q.bizSalaryPct+'" oninput="uq(\'bizSalaryPct\',+this.value)" style="margin-top:6px" /></div>':'')
      +'</div>'
      +'<div style="background:var(--bgc);border:1px solid var(--bd);border-radius:12px;padding:18px;margin-bottom:14px">'
      +'<div class="section-head">RRI / IPP</div>'
      +'<label style="display:flex;align-items:center;gap:10px;cursor:pointer;font-size:13px;color:var(--ts);margin-bottom:10px">'
      +'<input type="checkbox" '+(q.ippOn?"checked":"")+' onchange="uq(\'ippOn\',this.checked)" style="accent-color:var(--g);width:16px;height:16px" />'
      +t("Régime de retraite individuel (RRI/IPP) en place","Individual Pension Plan (IPP) in place")+'</label>'
      +(q.ippOn?'<label class="fld-label">'+t("Solde actuel du RRI","Current IPP balance")+' ($)</label>'
        +'<input class="inp" type="number" min="0" step="10000" value="'+(q.ippBal||0)+'" oninput="uq(\'ippBal\',+this.value)" />':'')
      +'</div>'
      +'<div style="background:var(--bgc);border:1px solid var(--bd);border-radius:12px;padding:18px;margin-bottom:14px">'
      +'<div class="section-head">'+t("Vente d'entreprise","Business sale")+'</div>'
      +'<label style="display:flex;align-items:center;gap:10px;cursor:pointer;font-size:13px;color:var(--ts);margin-bottom:10px">'
      +'<input type="checkbox" '+(q.bizSaleAge>0?"checked":"")+' onchange="uq(\'bizSaleAge\',this.checked?q.retAge:0)" style="accent-color:var(--g);width:16px;height:16px" />'
      +t("Vente d'entreprise planifiée","Business sale planned")+'</label>'
      +(q.bizSaleAge>0?'<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:4px">'
        +'<div><label class="fld-label">'+t("Âge prévu","Age")+'</label><input class="inp inp-sm" type="number" min="40" max="80" value="'+(q.bizSaleAge||q.retAge)+'" oninput="uq(\'bizSaleAge\',+this.value)" /></div>'
        +'<div><label class="fld-label">'+t("Prix estimé","Est. price")+' ($)</label><input class="inp inp-sm" type="number" min="0" step="50000" value="'+(q.bizSalePrice||0)+'" oninput="uq(\'bizSalePrice\',+this.value)" /></div>'
        +'<div><label class="fld-label">PBR ($)</label><input class="inp inp-sm" type="number" min="0" step="1000" value="'+(q.bizACB||100)+'" oninput="uq(\'bizACB\',+this.value)" /></div>'
        +'</div>'
        +'<label style="display:flex;align-items:center;gap:10px;cursor:pointer;font-size:12px;color:var(--ts);margin-top:8px">'
        +'<input type="checkbox" '+(q.bizLCGE?"checked":"")+' onchange="uq(\'bizLCGE\',this.checked)" style="accent-color:var(--g)" />'
        +t("ECGC disponible (1 250 000 $ en 2026)","LCGE available ($1,250,000 in 2026)")+'</label>':'')
      +'</div>'
      +'<div style="background:var(--ambg);border:1px solid rgba(184,152,48,.3);border-radius:10px;padding:12px 14px;margin-bottom:14px;font-size:12px;color:#5a4a00;line-height:1.6">'
      +'<strong>'+t("Note","Note")+'</strong> — '+t("Les analyses corporatives sont à titre éducatif. Consultez un CPA pour toute décision de rémunération.","Corporate analyses are for educational purposes. Consult a CPA for compensation decisions.")+'</div>'
      +'<button class="pbtn" onclick="goNextBlock(\'G\')">'+t("Générer mon rapport →","Generate my report →")+'</button>'
      +'<button class="back-btn" onclick="goPrevBlock(\'G\')" style="margin-top:10px;width:100%;text-align:center">'+t("Retour","Back")+'</button>'
    ,"G");
  }

  return'';
}

// ============================================================
// KEYBOARD ACCESSIBILITY
// ============================================================
document.addEventListener("keydown",function(e){
  if(e.key==="Enter"&&STATE.step>0&&STATE.step<8){
    var tag=document.activeElement?document.activeElement.tagName:"";
    if(tag==="TEXTAREA"||tag==="SELECT")return;
    if(document.activeElement&&document.activeElement.classList.contains("card")){
      document.activeElement.click();return;
    }
    var btn=document.querySelector(".pbtn");
    if(btn&&!btn.disabled)btn.click();
  }
});
document.addEventListener("keydown",function(e){
  if((e.key==="Enter"||e.key===" ")&&document.activeElement&&document.activeElement.classList.contains("card")){
    e.preventDefault();document.activeElement.click();
  }
});

// ============================================================
// INIT
// ============================================================
render();
</script>
</body>
</html>
