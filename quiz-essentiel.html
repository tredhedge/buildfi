<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>buildfi.ca — Rapport Essentiel</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',-apple-system,sans-serif;background:#FEFCF9;color:#1A1A1A}
:root{
  --g:#C4944A;--gl:#D4A85A;--gn:#2A8C46;--gnl:#3AA856;--am:#B89830;
  --rd:#CC4444;--bl:#4680C0;--pr:#7C60B8;--tx:#1A1A1A;--ts:#555;--tm:#888;
  --bg:#FEFCF9;--bgc:#fff;--bd:#E8E0D4;--bdl:#F0ECE4;
  --gbg:rgba(196,148,74,.08);--gnbg:rgba(42,140,70,.06);--ambg:rgba(184,152,48,.06);
  --rdbg:rgba(204,68,68,.06);--bga:rgba(124,96,184,.04);
}
.qs{animation:fadeIn .4s ease-out}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
input[type=range]{-webkit-appearance:none;width:100%;height:6px;background:var(--bd);border-radius:3px;outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:24px;height:24px;border-radius:50%;background:var(--g);cursor:pointer;box-shadow:0 2px 6px rgba(196,148,74,.3)}
.pbtn{display:block;width:100%;padding:14px;border-radius:12px;border:none;background:linear-gradient(135deg,var(--g),var(--gl));color:#fff;font-size:15px;font-weight:700;cursor:pointer;margin-top:20px;transition:transform .15s,box-shadow .15s}
.pbtn:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(196,148,74,.25)}
.pbtn:disabled{opacity:.6;cursor:not-allowed;transform:none;box-shadow:none}
.card{background:var(--bgc);border:2px solid var(--bd);border-radius:12px;padding:16px;margin-bottom:10px;cursor:pointer;transition:all .2s}
.card:hover{border-color:var(--gl);background:#FDF8F0}
.card.sel{border-color:var(--g);background:linear-gradient(135deg,#FFF8ED,#FDF3E0);box-shadow:0 3px 14px rgba(196,148,74,.25);transform:scale(1.02)}
.chip{display:inline-block;padding:8px 16px;border-radius:20px;border:2px solid var(--bd);background:var(--bgc);font-size:13px;cursor:pointer;transition:all .2s;margin:3px}
.chip:hover{border-color:var(--gl);background:#FDF8F0}
.chip.sel{border-color:var(--g);background:linear-gradient(135deg,#FFF8ED,#FDF3E0);color:var(--g);font-weight:700;box-shadow:0 2px 8px rgba(196,148,74,.2)}
.back-btn{padding:8px 16px;border-radius:8px;border:1px solid var(--bd);background:var(--bgc);font-size:11px;font-weight:600;cursor:pointer;color:var(--ts)}
.loading-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--g);margin:0 3px;animation:bounce .6s infinite alternate}
.loading-dot:nth-child(2){animation-delay:.2s}
.loading-dot:nth-child(3){animation-delay:.4s}
@keyframes bounce{to{opacity:.3;transform:translateY(-6px)}}
.err-msg{color:var(--rd);font-size:12px;margin-top:4px;display:none}
.err-msg.show{display:block}
.sample-frame{border:1px solid var(--bd);border-radius:12px;position:relative;-webkit-overflow-scrolling:touch}
.sample-frame::-webkit-scrollbar{width:6px}
.sample-frame::-webkit-scrollbar-thumb{background:var(--bd);border-radius:3px}
.sample-fade{position:sticky;bottom:0;left:0;right:0;height:80px;background:linear-gradient(transparent,#FEFCF9);pointer-events:none}
.tab-btn{padding:8px 20px;border-radius:8px;border:1px solid var(--bd);background:var(--bgc);font-size:13px;font-weight:600;cursor:pointer;color:var(--ts);transition:all .2s}
.tab-btn.active{border-color:var(--g);background:var(--gbg);color:var(--g);font-weight:700}
/* Report styles (for sample report rendering) */
.rpt-card{background:var(--bgc);border:1px solid var(--bd);border-radius:10px;padding:20px;margin-bottom:14px;box-shadow:0 1px 3px rgba(0,0,0,.03)}
.rpt-kp{text-align:center;padding:16px 10px 12px;border:1px solid var(--bd);border-radius:10px;background:var(--bgc)}
.rpt-kvr{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--bdl);font-size:13px}
.rpt-kvr span:first-child{color:var(--ts)}
.rpt-kvr span:last-child{font-family:monospace;font-weight:600}
.rpt-callout{border-radius:6px;padding:14px 16px;font-size:13px;color:#333;margin:12px 0;line-height:1.8}
.rpt-callout.info{background:var(--gbg);border:1px solid var(--g);border-left:4px solid var(--g)}
.rpt-callout.insight{background:var(--gnbg);border:1px solid var(--gn);border-left:4px solid var(--gn)}
.rpt-callout.warning{background:var(--ambg);border:1px solid var(--am);border-left:4px solid var(--am)}
.rpt-sec-h{display:flex;align-items:center;gap:10px;font-size:12px;color:var(--g);font-weight:700;text-transform:uppercase;letter-spacing:1.2px;margin-bottom:18px;padding-bottom:10px;border-bottom:2px solid var(--g)}
.rpt-sec-num{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--g),var(--gl));color:#fff;font-size:12px;font-weight:800}
.rpt-ai{font-size:14px;color:#444;line-height:1.8;margin:12px 0}
@media print{body{background:#fff}.no-print{display:none!important}}
@media(min-width:900px){
  body{font-size:16px}
  .qs h2{font-size:24px!important}
  .qs label{font-size:15px!important}
  .qs input[type="number"],.qs select{font-size:17px!important;padding:14px!important}
  .qs .card{padding:18px 16px!important}
  .qs .card div[style*="font-weight:700"]{font-size:16px!important}
  .qs .card div[style*="font-size:12px"]{font-size:13px!important}
  .pbtn{font-size:16px!important;padding:18px 20px!important}
  .back-btn{font-size:13px!important;padding:10px 20px!important}
}
@media(max-width:640px){
  .rpt-grid3{grid-template-columns:1fr!important}
  .rpt-grid2{grid-template-columns:1fr!important}
  .rpt-flex{flex-direction:column!important}
  .rpt-donut{flex-direction:column!important;align-items:center!important;gap:16px!important}
  .rpt-tax-label{width:100px!important;font-size:11px!important}
  .rpt-cta-grid{grid-template-columns:1fr!important}
  .debt-grid{grid-template-columns:1fr!important}
  .ls-grid4{grid-template-columns:repeat(2,1fr)!important}
}
@media(max-width:480px){
  body{font-size:14px}
  h1{font-size:22px!important}
  h2{font-size:18px!important}
}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ============================================================
// buildfi.ca — Quiz Essentiel (Thin Client)
// Engine runs server-side only. This file collects answers.
// ============================================================

// Province display names
var PROV_NAMES = {
  QC:"Qu\u00e9bec",ON:"Ontario",BC:"Colombie-Britannique",AB:"Alberta",
  MB:"Manitoba",SK:"Saskatchewan",NS:"Nouvelle-\u00c9cosse",NB:"Nouveau-Brunswick",
  NL:"Terre-Neuve-et-Labrador",PE:"\u00cele-du-Prince-\u00c9douard",
  NT:"Territoires du Nord-Ouest",YT:"Yukon",NU:"Nunavut"
};
var PROV_NAMES_EN = {
  QC:"Quebec",ON:"Ontario",BC:"British Columbia",AB:"Alberta",
  MB:"Manitoba",SK:"Saskatchewan",NS:"Nova Scotia",NB:"New Brunswick",
  NL:"Newfoundland and Labrador",PE:"Prince Edward Island",
  NT:"Northwest Territories",YT:"Yukon",NU:"Nunavut"
};

// ============================================================
// STATE
// ============================================================
var STATE = {
  step: 0, lang: "fr",
  quiz: {
    retAge:62, age:38, sex:"M", prov:"QC", employer:"large", couple:"no",
    income:75000, totalSavings:50000, monthlyContrib:500,
    savingsDetail:false, rrsp:0, tfsa:0, nr:0,
    debts:[], homeowner:false, homeValue:0, mortgage:0, mortgageAmort:20,
    lifestyle:"active", risk:"balanced",
    retSpending:5000, retSpendingCustom:false,
    equityPct:70, equityCustom:false,
    parttime:"no", parttimeAmount:0, parttimeYears:0,
    worries:[], win:"", fix:"", confidence:3, family:""
  },
  sampleTab: "marie" // "marie" or "jp"
};

// Restore from localStorage if available
try {
  var saved = localStorage.getItem("buildfi_quiz");
  if (saved) {
    var parsed = JSON.parse(saved);
    if (parsed && parsed.quiz && parsed.step != null) {
      STATE.step = parsed.step;
      STATE.lang = parsed.lang || "fr";
      STATE.quiz = Object.assign(STATE.quiz, parsed.quiz);
    }
  }
} catch(e) {}

// Save to localStorage on changes
function saveState() {
  try {
    localStorage.setItem("buildfi_quiz", JSON.stringify({
      step: STATE.step, lang: STATE.lang, quiz: STATE.quiz
    }));
  } catch(e) {}
}

// ============================================================
// HELPERS
// ============================================================
function f$(n) {
  if (n == null || isNaN(n)) return "\u2014";
  return (n < 0 ? "-" : "") + Math.abs(Math.round(n)).toString().replace(/\B(?=(\d{3})+(?!\d))/g, " ") + " $";
}

function gCol(s) { return s >= 90 ? "#2A8C46" : s >= 75 ? "#B89830" : "#CC4444"; }

var _dTimer = {};
function uq(key, val) { STATE.quiz[key] = val; saveState(); render(); }
// uqd: for number inputs. Does NOT re-render (so user can clear/type freely).
// Only saves to state + localStorage after 600ms pause.
function uqd(key, rawVal) {
  // Store as number if valid, keep current value if empty/NaN
  var n = parseFloat(rawVal);
  STATE.quiz[key] = isNaN(n) ? (rawVal === "" || rawVal == null ? 0 : STATE.quiz[key]) : n;
  clearTimeout(_dTimer[key]);
  _dTimer[key] = setTimeout(function() { saveState(); }, 600);
}

function setDebtField(type, field, rawVal) {
  var q = STATE.quiz;
  var d = q.debts.find(function(x){return x.type===type;});
  if (!d) { d = {type:type, amount:0, minPayment:0, rate:0}; q.debts.push(d); }
  var n = parseFloat(rawVal);
  d[field] = isNaN(n) ? 0 : n;
  q.debts = q.debts.filter(function(x){return x.amount > 0 || x.minPayment > 0 || x.rate > 0;});
  clearTimeout(_dTimer["debt_"+type+"_"+field]);
  _dTimer["debt_"+type+"_"+field] = setTimeout(function() { saveState(); }, 600);
}

function toggleWorry(w) {
  var q = STATE.quiz;
  if (q.worries.indexOf(w) >= 0) q.worries = q.worries.filter(function(x){return x!==w;});
  else if (q.worries.length < 3) q.worries.push(w);
  saveState();
  render();
}

function validateStep(step) {
  var q = STATE.quiz, fr = STATE.lang === "fr";
  if (step === 1) {
    if (q.age < 18 || q.age > 80) return fr ? "\u00c2ge doit \u00eatre entre 18 et 80 ans." : "Age must be between 18 and 80.";
    if (q.retAge <= q.age) return fr ? "L'\u00e2ge de retraite doit \u00eatre sup\u00e9rieur \u00e0 votre \u00e2ge actuel." : "Retirement age must be greater than current age.";
  }
  if (step === 3) {
    if (q.income <= 0) return fr ? "Veuillez entrer un revenu valide." : "Please enter a valid income.";
  }
  return null;
}

function go(step) {
  // Validate current step before advancing
  if (step > STATE.step && step > 1) {
    var err = validateStep(STATE.step);
    if (err) { alert(err); return; }
  }
  STATE.step = step;
  saveState();
  window.scrollTo({top:0, behavior:"smooth"});
  render();
}


function validateEmail(email) {
  return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
}

// ============================================================
// LOGO SVG (Warm Ember)
// ============================================================
function logoSVG(size, context) {
  var isDark = context === "dark";
  var tFill = isDark ? "#F0E4D4" : "#1A1A1A";
  var s = size === "lg" ? 1.2 : size === "md" ? 0.85 : 0.55;
  var w = Math.round(180 * s);
  var h = Math.round(52 * s);
  return '<svg width="'+w+'" height="'+h+'" viewBox="0 0 180 52" style="display:block">'
    + '<defs><linearGradient id="emb'+size+'" x1="0" y1="1" x2="0" y2="0"><stop offset="0%" stop-color="#C45A2C"/><stop offset="100%" stop-color="#E8A84C"/></linearGradient></defs>'
    + '<path d="M14 46 C14 46 8 30 14 18 C20 6 26 12 26 22 C26 12 32 0 38 10 C44 22 38 32 38 32" stroke="url(#emb'+size+')" stroke-width="3" fill="none" stroke-linecap="round"/>'
    + '<text x="48" y="36" font-family="DM Sans,sans-serif" font-size="32" font-weight="800" fill="'+tFill+'" letter-spacing="-1.2">build</text>'
    + '<text x="131" y="36" font-family="DM Sans,sans-serif" font-size="32" font-weight="800" fill="url(#emb'+size+')" letter-spacing="-1.2">fi</text>'
    + '</svg>';
}


function startCheckout() {
  var email = document.getElementById("buyer-email").value.trim();
  var fr = STATE.lang === "fr";
  if (!email || !validateEmail(email)) {
    alert(fr ? "Veuillez entrer une adresse courriel valide." : "Please enter a valid email address.");
    return;
  }
  var btn = document.querySelector("#email-gate button");
  btn.disabled = true;
  btn.textContent = fr ? "Redirection vers le paiement..." : "Redirecting to payment...";
  fetch("/api/checkout", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      quizAnswers: STATE.quiz,
      lang: STATE.lang,
      email: email,
      tier: "essentiel"
    })
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    if (data.url) {
      window.location.href = data.url;
    } else {
      alert(fr ? "Erreur. Veuillez r\u00e9essayer." : "Error. Please try again.");
      btn.disabled = false;
      btn.textContent = fr ? "Obtenir mon rapport complet \u2192" : "Get my full report \u2192";
    }
  })
  .catch(function() {
    alert(fr ? "Erreur de connexion. V\u00e9rifiez votre connexion internet." : "Connection error. Check your internet connection.");
    btn.disabled = false;
    btn.textContent = fr ? "Obtenir mon rapport complet \u2192" : "Get my full report \u2192";
  });
}

// ============================================================
// RENDER
// ============================================================
function render() {
  var app = document.getElementById("app");
  var s = STATE;

  if (s.step === 8) {
    app.innerHTML = renderPaywall(s.lang, s.sampleTab);
    return;
  }

  app.innerHTML = renderQuiz(s.step, s.quiz, s.lang);
}

// ============================================================
// LOADING → PAYWALL TRANSITION
// ============================================================
function showLoading() {
  STATE.step = 8;
  var app = document.getElementById("app");
  var fr = STATE.lang === "fr";
  app.innerHTML = '<div style="max-width:480px;margin:80px auto;text-align:center;padding:20px">'
    + '<div style="font-size:48px;margin-bottom:24px">\ud83d\udd2e</div>'
    + '<h2 style="font-size:20px;font-weight:700;color:var(--g)">' + (fr ? "Pr\u00e9paration de votre bilan..." : "Preparing your assessment...") + '</h2>'
    + '<p style="color:var(--ts);margin:12px 0;font-size:14px">' + (fr ? "Vos r\u00e9ponses sont enregistr\u00e9es." : "Your answers have been saved.") + '</p>'
    + '<div style="margin:24px 0"><span class="loading-dot"></span><span class="loading-dot"></span><span class="loading-dot"></span></div></div>';
  saveState();
  setTimeout(function() { render(); }, 2000);
}

// ============================================================
// QUIZ SCREENS
// ============================================================
function renderQuiz(step, q, lang) {
  var fr = lang === "fr", t = function(f,e){return fr?f:e;};
  var provNames = fr ? PROV_NAMES : PROV_NAMES_EN;
  var wrap = function(inner) {
    return '<div style="max-width:480px;margin:0 auto;padding:48px 20px 36px">'
      + (step > 0 ? '<div style="margin-bottom:24px"><div style="display:flex;justify-content:space-between;font-size:11px;color:var(--tm);margin-bottom:6px"><span>' + t("\u00c9tape","Step") + ' ' + step + '/7</span><span>' + Math.round(step/7*100) + '%</span></div><div style="height:4px;background:var(--bd);border-radius:2px"><div style="height:100%;background:var(--g);border-radius:2px;width:' + (step/7*100) + '%;transition:width .3s"></div></div></div>' : '')
      + '<div class="qs" key="' + step + '">' + inner + '</div></div>';
  };
  var btn = function(label) {
    return '<button class="pbtn" onclick="' + (step < 7 ? 'go(' + (step+1) + ')' : 'showLoading()') + '">' + label + '</button>';
  };
  var backBtn = step > 0 ? '<button class="back-btn" onclick="go(' + (step-1) + ')" style="margin-top:10px">' + t("Retour","Back") + '</button>' : '';

  // === STEP 0: LANDING ===
  if (step === 0) {
    return '<div style="min-height:100vh;display:flex;flex-direction:column;justify-content:center;max-width:520px;margin:0 auto;padding:40px 24px">'
      + '<div style="display:flex;justify-content:center;gap:6px;margin-bottom:32px">'
      + '<button onclick="STATE.lang=\'fr\';saveState();render()" style="padding:4px 12px;border-radius:6px;border:' + (fr?"2px solid var(--g)":"1px solid var(--bd)") + ';background:' + (fr?"var(--gbg)":"var(--bgc)") + ';font-size:10px;font-weight:700;cursor:pointer">FR</button>'
      + '<button onclick="STATE.lang=\'en\';saveState();render()" style="padding:4px 12px;border-radius:6px;border:' + (!fr?"2px solid var(--g)":"1px solid var(--bd)") + ';background:' + (!fr?"var(--gbg)":"var(--bgc)") + ';font-size:10px;font-weight:700;cursor:pointer">EN</button></div>'
      + '<div style="text-align:center;margin-bottom:32px">'
      + '<div style="display:flex;justify-content:center">' + logoSVG("lg","light") + '</div>'
      + '<div style="font-size:10px;color:var(--tm);letter-spacing:1px;text-transform:uppercase;margin-top:8px">' + t("Bilan retraite personnalis\u00e9","Personalized retirement assessment") + '</div></div>'
      + '<h1 style="font-size:24px;font-weight:700;line-height:1.3;text-align:center;margin:0 0 12px">'
      + t("Est-ce que votre plan tient la route\u00a0?","Is your retirement plan on track?") + '</h1>'
      + '<p style="font-size:14px;color:var(--ts);line-height:1.65;text-align:center;max-width:400px;margin:0 auto 28px">'
      + t("Quelques questions, 5\u00a0000 sc\u00e9narios simul\u00e9s, un portrait clair \u2014 en langage que vous comprenez vraiment. Pas de jargon. Pas de rendez-vous. Environ 3 \u00e0 5 minutes.",
         "A few questions, 5,000 simulated scenarios, a clear portrait \u2014 in language you actually understand. No jargon. No appointment. About 3 to 5 minutes.") + '</p>'
      + '<div style="background:var(--bgc);border:1px solid var(--bd);border-radius:12px;padding:18px 20px;margin-bottom:24px">'
      + '<div style="font-size:12px;font-weight:700;color:var(--g);margin-bottom:10px">'
      + t("Pour un portrait plus pr\u00e9cis, ayez sous la main\u00a0:","For a more accurate portrait, have handy:") + '</div>'
      + '<div style="display:grid;gap:6px">'
      + [{f:"Votre \u00e9pargne totale approximative",e:"Your approximate total savings"},
         {f:"Votre cotisation mensuelle",e:"Your monthly contribution"},
         {f:"Relev\u00e9 RRQ ou RPC (Mon dossier \u2014 rrq.gouv.qc.ca ou canada.ca)",e:"CPP/QPP statement (My Service Canada Account \u2014 canada.ca)"},
         {f:"Votre solde hypoth\u00e9caire, si applicable",e:"Your mortgage balance, if applicable"},
         {f:"Vos soldes de dettes, si applicable",e:"Your debt balances, if applicable"}
        ].map(function(item) {
          return '<div style="display:flex;align-items:center;gap:8px;font-size:13px;color:var(--ts)"><div style="width:6px;height:6px;border-radius:50%;background:var(--g);flex-shrink:0;opacity:.6"></div>' + t(item.f, item.e) + '</div>';
        }).join("")
      + '</div>'
      + '<div style="font-size:11px;color:var(--tm);margin-top:10px;font-style:italic">'
      + t("Des estimations suffisent \u2014 le simulateur fait le reste.","Rough estimates are fine \u2014 the simulator does the rest.") + '</div></div>'
      + '<div style="display:flex;justify-content:center;gap:12px;flex-wrap:wrap;margin-bottom:28px">'
      + '<span style="display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:20px;background:var(--bgc);border:1px solid var(--bd);font-size:13px;color:var(--ts);font-weight:500">\ud83c\udde8\ud83c\udde6 ' + t("Con\u00e7u pour le Canada","Built for Canada") + '</span>'
      + '<span style="display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:20px;background:var(--bgc);border:1px solid var(--bd);font-size:13px;color:var(--ts);font-weight:500">\ud83d\udd12 ' + t("Aucun compte requis","No account needed") + '</span>'
      + '<span style="display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:20px;background:var(--bgc);border:1px solid var(--bd);font-size:13px;color:var(--ts);font-weight:500">\ud83d\udcca 5\u00a0000 simulations</span></div>'
      + '<button class="pbtn" onclick="go(1)">' + t("Commencer mon bilan","Start my assessment") + '</button>'
      + '</div>';
  }

  // === STEP 1: ABOUT YOU ===
  if (step === 1) {
    var sexCards = [{v:"M",l:t("Homme","Male")},{v:"F",l:t("Femme","Female")}].map(function(o){return '<div class="card' + (q.sex===o.v?" sel":"") + '" onclick="uq(\'sex\',\'' + o.v + '\')" style="flex:1;text-align:center;padding:14px"><div style="font-weight:700">' + o.l + '</div></div>';}).join("");
    var provOptions = ["QC","ON","BC","AB","MB","SK","NS","NB","NL","PE","NT","YT","NU"].map(function(p){return '<option value="'+p+'"'+(q.prov===p?' selected':'')+'>'+p+' \u2014 '+provNames[p]+'</option>';}).join("");
    return wrap('<h2 style="font-size:20px;font-weight:700;margin-bottom:20px">' + t("Parlons de vous","About you") + '</h2>'
      + '<label style="font-size:13px;color:var(--ts);display:block;margin-bottom:6px">' + t("\u00c2ge actuel","Current age") + '</label>'

    var homeInputs = q.homeowner ? '<label style="font-size:12px;color:var(--ts);display:block;margin-top:12px">' + t("Valeur de la propri\u00e9t\u00e9","Property value") + ' ($)</label><input type="number" min="0" step="10000" value="' + (q.homeValue||0) + '" oninput="uqd(\'homeValue\',this.value)" style="width:100%;padding:10px;border-radius:8px;border:1px solid var(--bd);font-size:14px;margin-top:4px" /><label style="font-size:12px;color:var(--ts);display:block;margin-top:12px">' + t("Solde hypoth\u00e9caire","Mortgage balance") + ' ($)</label><input type="number" min="0" step="5000" value="' + (q.mortgage||0) + '" oninput="uqd(\'mortgage\',this.value)" style="width:100%;padding:10px;border-radius:8px;border:1px solid var(--bd);font-size:14px;margin-top:4px" /><label style="font-size:12px;color:var(--ts);display:block;margin-top:12px">' + t("Ann\u00e9es restantes","Years remaining") + '</label><input type="number" min="1" max="30" value="' + (q.mortgageAmort||20) + '" oninput="uqd(\'mortgageAmort\',this.value)" style="width:100%;padding:10px;border-radius:8px;border:1px solid var(--bd);font-size:14px;margin-top:4px" />' : '';

    var riskCustomInput = q.equityCustom ? '<div style="background:var(--gbg);border-radius:10px;padding:14px 16px;margin-top:8px"><label style="font-size:12px;color:var(--ts)">' + t("Pourcentage en actions","Equity percentage") + '</label><div style="display:flex;align-items:center;gap:12px;margin-top:6px"><input type="range" min="10" max="100" value="' + (q.equityPct||70) + '" oninput="uq(\'equityPct\',+this.value)" style="flex:1" /><span style="font-family:monospace;font-size:18px;font-weight:700;color:var(--g);min-width:50px;text-align:center">' + (q.equityPct||70) + '%</span></div><div style="display:flex;justify-content:space-between;font-size:10px;color:var(--tm);margin-top:4px"><span>' + t("Obligations","Bonds") + '</span><span>' + t("Actions","Equity") + '</span></div></div>' : '';

    var ptCards = [{v:"yes",l:t("Oui","Yes")},{v:"maybe",l:t("Peut-\u00eatre","Maybe")},{v:"no",l:t("Non","No")}].map(function(o){return '<div class="card' + (q.parttime===o.v?" sel":"") + '" onclick="uq(\'parttime\',\'' + o.v + '\')" style="flex:1;text-align:center"><div style="font-weight:700">' + o.l + '</div></div>';}).join("");

  // === STEP 7: FINAL QUESTIONS ===
  if (step === 7) {
    var fixCards = [{v:"save_more",l:t("\u00c9pargner plus","Save more")},{v:"debt",l:t("Rembourser mes dettes","Pay off debt")},{v:"invest",l:t("Mieux investir","Invest better")},{v:"tax",l:t("Payer moins d\u2019imp\u00f4ts","Pay less tax")},{v:"retire_early",l:t("Retraite plus t\u00f4t","Retire earlier")},{v:"clarity",l:t("Y voir plus clair","Get clarity")}].map(function(o){return '<div class="card' + (q.fix===o.v?" sel":"") + '" onclick="uq(\'fix\',\'' + o.v + '\')" style="padding:12px"><div style="font-weight:600;font-size:13px">' + o.l + '</div></div>';}).join("");

    return wrap('<h2 style="font-size:20px;font-weight:700;margin-bottom:20px">' + t("Derni\u00e8res questions","Final questions") + '</h2>'
      + '<label style="font-size:13px;color:var(--ts);display:block;margin-bottom:8px">' + t("Si vous pouviez am\u00e9liorer une chose","If you could improve one thing") + '</label>' + fixCards
      + '<label style="font-size:13px;color:var(--ts);display:block;margin:16px 0 8px">' + t("Confiance financi\u00e8re (1-5)","Financial confidence (1-5)") + '</label>'
      + '<input type="range" min="1" max="5" value="' + q.confidence + '" oninput="uq(\'confidence\',+this.value)" />'
      + '<div style="display:flex;justify-content:space-between;font-size:11px;color:var(--tm)"><span>' + t("D\u00e9butant","Beginner") + '</span><span style="font-weight:700;color:var(--g)">' + q.confidence + '/5 \u2014 ' + (confLabels[q.confidence]||"") + '</span><span>' + t("Expert","Expert") + '</span></div>'
      + btn(t("Voir mon rapport","See my report")) + backBtn);
  }

  return '';
}

  h += '<div style="text-align:center;margin-bottom:20px">';

  h += '<div style="font-size:42px;font-weight:800;color:var(--tx);margin-bottom:4px">39 <span style="font-size:20px">$</span></div>';
  h += '<div style="font-size:12px;color:#888;margin-bottom:20px">CAD \u2014 '+t("paiement unique","one-time payment")+'</div>';
  h += '<div id="email-gate" style="max-width:400px;margin:0 auto;margin-bottom:16px">';
  h += '<input id="buyer-email" type="email" placeholder="'+t("Votre adresse courriel","Your email address")+'" style="width:100%;padding:14px;border-radius:10px;border:1px solid #ddd;font-size:15px;box-sizing:border-box;margin-bottom:12px">';
  h += '<button onclick="startCheckout()" style="width:100%;padding:16px;background:linear-gradient(135deg,var(--g),var(--gl));color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer">';
  h += t("Obtenir mon rapport complet \u2192","Get my full report \u2192");
  h += '</button></div>';
  h += '<div style="font-size:12px;color:#aaa">'+t("Votre satisfaction est importante pour nous \u2014 ","Your satisfaction matters to us \u2014 ")+'<a href="mailto:support@buildfi.ca" style="color:var(--g)">support@buildfi.ca</a></div>';
  h += '</div>';

  // Back link
  h += '<div style="text-align:center;margin-top:16px;margin-bottom:80px"><button class="back-btn" onclick="STATE.step=7;saveState();render()">\u2190 '+t("Modifier mes r\u00e9ponses","Edit my answers")+'</button></div>';

  // Sticky bottom CTA (mobile-friendly, always visible)
  h += '<div class="no-print" style="position:fixed;bottom:0;left:0;right:0;background:rgba(254,252,249,.97);border-top:1px solid var(--bd);padding:12px 20px;z-index:100;backdrop-filter:blur(8px)">';
  h += '<div style="max-width:480px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:12px">';
  h += '<div><span style="font-size:20px;font-weight:800">39 $</span> <span style="font-size:12px;color:#888">CAD</span></div>';
  h += '<button onclick="document.getElementById(\'buyer-email\').scrollIntoView({behavior:\'smooth\',block:\'center\'});document.getElementById(\'buyer-email\').focus()" style="flex:1;max-width:280px;padding:12px 20px;background:linear-gradient(135deg,var(--g),var(--gl));color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer">'+t("Obtenir mon rapport \u2192","Get my report \u2192")+'</button>';
  h += '</div></div>';

  h += '</div>';
  return h;
}
